<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The DALEY Model for Learning Design</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#013B46; --cyan:#19FCFC; --aqua:#00A9C9; --ink:#0d1719; --muted:#5c6c6f;
  --line:#e8ebeb; --tint:rgba(1,59,70,.045);
  --radius:14px; --shadow:0 1px 0 rgba(1,59,70,.02),0 18px 40px -28px rgba(1,59,70,.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',system-ui,sans-serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(900px 380px at 50% -160px, var(--tint), transparent 70%), #fff;}

.app{max-width:1100px;margin:24px auto;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:#fff;box-shadow:var(--shadow);}

/* HEADER */
.hdr{padding:22px 28px 18px;border-bottom:1px dashed var(--line);display:flex;align-items:center;justify-content:space-between;gap:16px;}
.hdr-logo{height:46px;width:auto;max-width:260px;object-fit:contain;display:block;flex-shrink:0;}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);}
.hdr .sub{font-size:9px;font-weight:500;color:var(--muted);letter-spacing:1px;}

/* STAT TILES */
.stats{display:flex;border-bottom:1px solid var(--line);}
.stat{flex:1;padding:20px 16px;text-align:center;background:#fff;border-right:1px solid var(--line);}
.stat:last-child{border-right:none;}
.stat:hover{background:var(--tint);}
.stat .sv{font-size:34px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-1px;}
.stat .sl{font-size:8px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:2px;margin-top:6px;}

/* PHASE TABS */
.tabs{display:flex;border-bottom:1px solid var(--line);gap:6px;padding:8px 10px;background:#fff;}
.tab{flex:1;padding:13px 6px;font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--ink);text-align:center;transition:all .2s;background:#fff;border:1px solid var(--line);border-radius:8px;}
.tab:hover{color:var(--ink);background:var(--tint);border-color:var(--teal);}
.tab.active{color:var(--teal);background:var(--tint);border-color:var(--teal);}
.tab .tn{display:block;font-size:7px;color:var(--aqua);letter-spacing:1px;margin-bottom:2px;}

/* BODY */
.body{display:flex;min-height:500px;}
.list{flex:1;overflow-y:auto;max-height:600px;padding:6px;}
.sidebar{width:0;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1);background:#fafbfb;border-left:1px solid var(--line);}
.sidebar.open{width:380px;}
.sb-inner{width:380px;padding:20px;overflow-y:auto;max-height:600px;}

/* RTE BANNER */
.rte-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:4px 6px;background:var(--tint);border:1px dashed var(--teal);border-radius:8px;}
.rte-icon{width:28px;height:28px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:50%;}
.rte-icon svg{width:14px;height:14px;}
.rte-text{flex:1;}
.rte-title{font-size:10px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:1px;}
.rte-desc{font-size:9px;color:var(--muted);line-height:1.4;margin-top:2px;}

/* LIST CARDS */
.card{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px;border:1px solid transparent;}
.card:hover{background:var(--tint);border-color:var(--line);}
.card.sel{background:var(--tint);border-color:var(--teal);}
.num{width:30px;height:30px;background:transparent;color:var(--ink);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card.sel .num{color:var(--teal);}
.ic{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ic svg{width:24px;height:24px;}
.info{flex:1;min-width:0;}
.nm{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;letter-spacing:.2px;}
.ds{font-size:10px;color:var(--muted);line-height:1.4;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tgs{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap;}
.tg{font-size:7px;font-weight:600;padding:3px 8px;letter-spacing:1.2px;text-transform:uppercase;border-radius:6px;background:#fff;}
.tg.process{color:var(--muted);border:1px solid var(--line);}
.tg.milestone{color:var(--aqua);border:1px solid rgba(0,169,201,.35);}
.tg.gate{color:var(--ink);border:1px solid var(--line);}
.tg.dt{color:var(--aqua);border:1px solid rgba(0,169,201,.25);}
.tg.meeting{color:var(--teal);border:1px solid rgba(1,59,70,.3);}
.tg.signoff{color:var(--teal);border:1px solid rgba(1,59,70,.3);}
.arr{color:var(--muted);font-size:18px;align-self:center;transition:color .15s;}
.card:hover .arr{color:var(--teal);}

/* SIDEBAR */
.sb-x{background:#fff;border:1px solid var(--line);width:28px;height:28px;font-size:13px;cursor:pointer;color:var(--muted);float:right;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.sb-x:hover{border-color:var(--teal);color:var(--ink);}
.sb-phase{font-size:8px;font-weight:600;color:var(--aqua);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px;}
.sb-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:.2px;line-height:1.3;padding-right:40px;margin-bottom:6px;}
.sb-rule{width:40px;height:2px;background:var(--cyan);margin-bottom:10px;}
.sb-desc{font-size:11px;color:var(--ink);line-height:1.6;margin-bottom:14px;}
.sb-section{margin-bottom:16px;}
.sb-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--teal);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--line);}
.sb-list{list-style:none;padding:0;counter-reset:sbc;}
.sb-list li{font-size:11px;color:var(--ink);line-height:1.55;padding:3px 0 3px 24px;counter-increment:sbc;position:relative;}
.sb-list li::before{content:counter(sbc,decimal-leading-zero);position:absolute;left:0;color:var(--aqua);font-size:9px;font-weight:700;}
.sb-tool{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;font-size:10px;font-weight:500;color:var(--teal);background:#fff;border:1px solid rgba(1,59,70,.3);border-radius:6px;margin:2px 4px 2px 0;text-decoration:none;transition:all .12s;cursor:pointer;}
.sb-tool:hover{background:var(--tint);border-color:var(--teal);}
.sb-tool svg{width:10px;height:10px;}
.sb-tool-nolink{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;font-size:10px;font-weight:500;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:6px;margin:2px 4px 2px 0;}
.sb-del{display:inline-block;background:#fff;border:1px solid var(--line);color:var(--teal);padding:5px 10px;font-size:10px;font-weight:500;margin:2px 4px 2px 0;border-radius:6px;}

/* ACCORDION */
.acc-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 0;border-bottom:1px solid var(--line);margin-bottom:6px;}
.acc-toggle .sb-label{margin:0;padding:0;border:none;cursor:pointer;}
.acc-chevron{font-size:12px;color:var(--teal);transition:transform .2s;font-weight:700;}
.acc-chevron.open{transform:rotate(180deg);}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s;}
.acc-body.open{max-height:3000px;}

/* AI PROMPT CARDS (per-prompt collapse) */
.ai-card{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.ai-card:hover{border-color:var(--teal);}
.ai-card.open{border-color:var(--teal);}
.ai-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;}
.ai-head:hover{background:var(--tint);}
.ai-ref{flex:1;min-width:0;font-size:10px;font-weight:600;color:var(--ink);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;line-height:1.3;}
.ai-ref::before{content:'';display:inline-block;width:6px;height:6px;background:var(--cyan);border-radius:2px;flex-shrink:0;}
.ai-chevron{font-size:9px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.ai-card.open .ai-chevron{transform:rotate(180deg);color:var(--teal);}
.ai-body{display:none;padding:0 12px 12px;}
.ai-card.open .ai-body{display:block;}
.ai-prompt{font-size:10.5px;color:var(--ink);line-height:1.6;white-space:pre-wrap;word-wrap:break-word;border-top:1px dashed var(--line);padding-top:10px;}
.ai-prompt .placeholder{color:var(--teal);font-weight:600;}
.ai-copy{flex-shrink:0;background:#fff;border:1px solid var(--line);font-size:9px;font-weight:600;color:var(--muted);padding:3px 9px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;border-radius:6px;}
.ai-copy:hover{border-color:var(--teal);color:var(--teal);}
.ai-copy.copied{color:var(--teal);border-color:var(--teal);}

/* SCROLLBARS */
.list::-webkit-scrollbar,.sb-inner::-webkit-scrollbar{width:4px;}
.list::-webkit-scrollbar-thumb,.sb-inner::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}

/* ── TAB DESCRIPTION ── */
.tab-desc{display:block;font-size:7px;font-weight:500;letter-spacing:.5px;text-transform:none;color:var(--muted);margin-top:4px;line-height:1.3;}
.tab.active .tab-desc{color:var(--ink);}

/* ── DALEY DROP-CAP LETTER ── */
.tab .dl{font-size:18px;font-weight:700;color:var(--teal);display:block;line-height:1;margin-bottom:2px;letter-spacing:0;}
.tab.active .dl{color:var(--teal);}
</style>
</head>

{name:'Kick-off Meeting',ic:'rocket',t:'milestone',meeting:true,desc:'A structured meeting with stakeholders and SMEs to align on project scope, goals, constraints, timelines, and success criteria. Establishes the foundation for the project and builds early stakeholder buy-in.',subs:['Prepare and distribute meeting agenda','Identify and invite all key stakeholders and SMEs','Clarify business objectives and success criteria','Document decisions, action items, and open questions','Establish communication cadence and project governance'],tools:[{n:'Kick-Off Meeting Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQA1AFS-f1tCR7-GuEOtQNmSAfY36hqt6q6ZOfzIZ3xUsYg?e=EzjC7v'}],del:['Kick-off Meeting Agenda','Project Summary'],ai:[{ref:'Kick-off Meeting Invite and Agenda',prompt:'Generate a calendar invite for a Kick-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, untimed meeting agenda covering:\n   • Introductions and roles\n   • Project overview — business problem, goals, and scope\n   • Success criteria and constraints\n   • Timeline and key milestones\n   • Risks and concerns\n   • Communication cadence and project governance\n   • Next steps and action items\n\nPurpose: Align stakeholders and SMEs on project scope, goals, constraints, timelines, and success criteria. Establish the foundation for the project and build early stakeholder buy-in.\nDesired Outcome: Shared understanding of the project, clear roles and responsibilities, and agreement on next steps.\n\nProject Summary: [attach or paste your Project Summary, or describe the project]'},{ref:'Kick-off Meeting Summary',prompt:'Summarize the attached Kick-off Meeting notes into a stakeholder-ready meeting summary formatted as a Word document.\n\nUsing the attached notes as a reference, organize the summary as follows:\n\n1. MEETING OVERVIEW\n• Date, attendees, and topic covered\n• Brief summary of the project purpose and scope\n\n2. KEY TAKEAWAYS\n• Summarize the main points discussed\n• Highlight critical content, expert insights, real-world examples, common misconceptions, and edge cases shared by the SME\n\n3. ACTION ITEMS & NEXT STEPS\n• Follow-up questions for the stakeholders or SME\n• Content gaps that still need to be addressed\n• Decisions needed before development can proceed\n• Any items requiring stakeholder input\n\nFormatting: Use headers, bold text, and bullet points for scannability. Keep the tone professional and concise.\n\nKick-off Meeting Notes: [attach or paste your kick-off meeting notes]'}]},

{name:'Solution Decision Meeting',ic:'diamond',t:'milestone',meeting:true,desc:'A stakeholder meeting to present performance analysis findings, discuss root causes, and make the critical go/no-go decision on whether training is the right solution. If the root cause is a knowledge or skill gap, the project proceeds to needs assessment. If environmental, procedural, or motivational, a non-training intervention is recommended and the project pivots or closes.',subs:['Prepare and distribute performance analysis findings in advance','Present desired vs. current performance state','Review root cause analysis results','Discuss training vs. non-training recommendation','Consult with stakeholders on recommendation','Document the decision rationale','If YES: proceed to Needs Assessment and Analysis','If NO: propose alternative solution and close project','Align on next steps and document decisions'],tools:[{n:'Training Proposal Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCebEEhGdHpTqIOl9Go47Z2AYALluAZA4xOe4-dC87pD7o?e=sf7i57'}],del:['Solution Decision Meeting Presentation','Solution Decision Meeting Summary','Stakeholder alignment on recommendation','Training Proposal (partially complete)'],ai:[{ref:'Solution Decision Meeting Presentation',prompt:'Create a stakeholder-facing presentation based on the attached completed Training Proposal. Keep it to a maximum of 10 slides, written for decision-makers rather than instructional designers.\n\nSuggested flow: title, the business problem/performance gap, root-cause findings, recommended solution, scope & approach, target audience, timeline/milestones, investment/resources, expected outcomes & success measures, and a clear ask/decision slide.\n\nMatch the client\'s branding — fonts, colors, logo placement, and slide layouts — using the attached PowerPoint template and/or brand kit. If I have not provided a brand example, ask me to share the client\'s PowerPoint template or brand kit before generating the presentation.\n\nTraining Proposal: [attach completed Training Proposal]\nBrand / Template: [attach PowerPoint template and/or brand kit]'},{ref:'Solution Decision Meeting Invite and Agenda',prompt:'Generate a calendar invite for a Solution Decision Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, untimed meeting agenda covering:\n   • Introductions and roles\n   • Recap of the performance analysis findings — desired vs. current performance state\n   • Review of root cause analysis results\n   • Training vs. non-training recommendation\n   • Go/no-go decision and rationale\n   • If YES: next steps toward Needs Assessment and Analysis\n   • If NO: recommended non-training intervention and project pivot or close\n   • Next steps and action items\n\nPurpose: Present performance analysis findings, discuss root causes, and make the go/no-go decision on whether training is the right solution.\nDesired Outcome: A clear, documented decision with stakeholder alignment on the recommended path forward.\n\nProject Summary: [attach or paste your Project Summary, or describe the project]'},{ref:'Solution Decision Meeting Summary',prompt:'Summarize the attached Solution Decision Meeting notes into a stakeholder-ready meeting summary formatted as a Word document.\n\nUsing the attached notes as a reference, organize the summary as follows:\n\n1. MEETING OVERVIEW\n• Date, attendees, and topic covered\n• Brief summary of the performance gap and meeting purpose\n\n2. KEY TAKEAWAYS\n• Summarize the performance analysis findings discussed (desired vs. current performance state)\n• Highlight the root causes reviewed and the training vs. non-training recommendation\n\n3. DECISION & NEXT STEPS\n• The go/no-go decision and its rationale\n• If YES: next steps toward Needs Assessment and Analysis\n• If NO: the recommended non-training intervention and how the project pivots or closes\n• Follow-up questions or items requiring stakeholder input\n\nFormatting: Use headers, bold text, and bullet points for scannability. Keep the tone professional and concise.\n\nSolution Decision Meeting Notes: [attach or paste your meeting notes]'}]},

{name:'Identify Instructional Goal(s)',ic:'target',t:'process',desc:'Translate business objectives and performance gaps into clear, measurable instructional goals that define what learners will be able to do after training. These goals drive all subsequent design decisions.',subs:['Review performance analysis and business objectives','Draft instructional goal statements','Validate goals with stakeholders and SMEs','Ensure goals are measurable and observable'],tools:[{n:'Needs Assessment Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQB1wXdXDEHWQofTD9carV0RATf0TjlAjI1V6Gs3q8M8yb8?e=FwCGHx'}],del:['Needs Assessment (partially complete)'],ai:[{ref:'Goal Evaluator',prompt:'Evaluate the following instructional goal(s) against these criteria:\n\n1. CONGRUENCE WITH ORGANIZATIONAL NEEDS\n• Is the goal clearly linked to an identified organizational problem?\n• Is it linked to documented performance gaps?\n• Does it clearly solve the business problem?\n• Do stakeholders approve the goal?\n\n2. CAPACITY\n• Is there sufficient capacity, time, and budget to develop and deliver?\n• Is there an adequate number of learners for testing?\n\n3. CLARITY\n• Does the goal state the intended learner audience?\n• Does it describe what learners will be able to do?\n• Does it describe the conditions under which learners will perform?\n\nFor each criterion, rate as Met, Partially Met, or Not Met with a brief justification. Provide an overall assessment and specific recommendations for improvement.\n\nInstructional Goal(s): [paste your instructional goal(s)]'}]},

{name:'Needs Assessment',ic:'checklist',t:'milestone',meeting:true,desc:'The Needs Assessment encompasses three core analysis activities — instructional analysis, learner and context analysis, and job/skills analysis — that together ensure the training solution is grounded in a thorough understanding of the performance gap, the target audience, and job requirements. Includes validation meetings with SMEs and stakeholders to confirm findings, review instructional analysis results, and validate learner profiles and task analysis outputs before moving to design.',subs:['<strong>Assess Needs and Conduct Instructional Analysis</strong> — Decompose the learning need: goals analysis, subordinate skills analysis, entry-level skills, instructional/performance contexts','<strong>Analyze Learners and Contexts</strong> — Profile target audience, analyze learning context and performance context, define demographics, assess motivations and preferences, identify transfer barriers','<strong>Conduct Job/Skills Analysis</strong> — Interview SMEs and high performers, observe task performance, document task sequences and decision points, identify critical vs. nice-to-have skills, validate with multiple SMEs','Schedule and distribute needs assessment findings in advance','Review instructional analysis and subordinate skills with SMEs','Validate learner profiles and context analysis','Confirm job/task analysis with SMEs','Document agreements, open questions, and revisions needed'],tools:[{n:'Needs Assessment Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQB1wXdXDEHWQofTD9carV0RATf0TjlAjI1V6Gs3q8M8yb8?e=FwCGHx'},{n:'Job Analysis Template',link:'https://1drv.ms/x/c/cc839e3a35a19644/IQAARWg8dteUQ6UbkXgur40tAc7GBBmZlDEeXIuOfkhc-a8?e=0ggG1v'}],del:['Needs Assessment (completed in full)','Needs Assessment Meeting Summary'],ai:[{ref:'Needs Assessment Template Completer',prompt:'Complete the attached Needs Assessment Template covering instructional analysis, learner analysis, and job/task analysis for a training project on [topic]. For each analysis, define the approach, data collection methods, and expected outputs.'},{ref:'Needs Assessment Meeting Invite and Agenda',prompt:'Generate a calendar invite for a Needs Assessment Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, untimed meeting agenda covering:\n   • Introductions and roles\n   • Review of instructional analysis findings\n   • Review of learner and context analysis\n   • Review of job/task analysis findings\n   • Open questions and revisions needed\n   • Next steps and action items\n\nPurpose: Review and validate needs assessment findings including instructional analysis, learner analysis, and job/task analysis.\nDesired Outcome: SME and stakeholder validation of findings, with documented agreements and any revisions needed before moving to design.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Needs Assessment Meeting Summary',prompt:'Summarize the attached Needs Assessment Meeting transcript into a stakeholder-ready meeting summary. First provide the summary as text in the chat, then generate a branded Word document (.docx) version.\n\nUsing the attached transcript as a reference, organize the summary as follows:\n\n1. MEETING OVERVIEW\n• Date, attendees, and topic covered\n• Brief summary of the needs assessment scope and meeting purpose\n\n2. KEY TAKEAWAYS\n• Summarize the instructional analysis, learner analysis, and job/task analysis findings discussed\n• Highlight validation decisions, SME input, and any revisions requested\n\n3. AGREEMENTS & NEXT STEPS\n• What was confirmed or validated\n• Revisions or follow-ups needed before moving to design\n• Open questions or items requiring stakeholder or SME input\n\nFormatting: Use headers, bold text, and bullet points for scannability. Keep the tone professional and concise.\n\nNeeds Assessment Meeting Transcript: [paste or attach your meeting transcript]'},{ref:'Subordinate Skills Breakdown',prompt:'Conduct a subordinate skills analysis for this goal: [state goal]. Break it into all knowledge and skills organized hierarchically.'},{ref:'Task Analysis Generator',prompt:'Create a task analysis for the role of [job title]. Break down responsibilities into discrete tasks with knowledge, skills, and tools required.'},{ref:'Training Proposal Template Completer',prompt:'Using the attached meeting transcript and Performance Analysis results, complete the Training Proposal Template. Pull the recommended solution, objectives, scope, audience, and rationale from the Performance Analysis, and use the transcript to capture stakeholder priorities, constraints, timeline, and success measures.\n\nAfter completing the template, add three clearly labeled sections:\n• RISKS — delivery, scope, resourcing, or adoption risks that could affect the proposal\n• GAPS — missing information or decisions still needed before the proposal is final\n• QUESTIONS FOR STAKEHOLDERS & SMEs — specific questions to validate assumptions and close the gaps\n\nMeeting Transcript: [paste or attach transcript]\nPerformance Analysis Results: [attach Performance Analysis]\nTraining Proposal Template: [attach template]'}]},

{name:'Write Learning and Terminal Objectives',ic:'pencil',t:'process',desc:'Transform instructional goals into specific, measurable learning objectives (enabling) and terminal objectives. Well-written objectives drive assessment design, content selection, and instructional strategy.',subs:['Write terminal objective','Decompose into learning objectives','Use ABCD format (Audience, Behavior, Condition, Degree)','Align to Bloom\'s Taxonomy levels','Review with SMEs for accuracy'],tools:[{n:'Training Proposal Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCebEEhGdHpTqIOl9Go47Z2AYALluAZA4xOe4-dC87pD7o?e=juhZOE'}],del:['Training Proposal (partially complete)'],ai:[{ref:'Objective Writer',prompt:'Write learning objectives for [topic]. Terminal objective: [state]. Use Bloom\'s and ABCD format. Generate both terminal and enabling objectives.'},{ref:'Objectives Evaluator',prompt:'Evaluate the following learning objectives against these criteria:\\n\\n1. GOAL STATEMENT\\n• Does it describe the ultimate performance context?\\n• Is the context authentic and realistic?\\n\\n2. BEHAVIORS\\n• Is the behavior congruent with the instructional goal?\\n• Does it describe actions learners perform (not how they respond to learning)?\\n• Is the behavior clear and observable?\\n\\n3. CONDITIONS\\n• Do conditions specify cues or stimulus provided to learners?\\n• Do conditions specify resources and tools needed?\\n• Do conditions control task complexity based on learners\' needs?\\n• Do conditions aid transfer of learning to performance contexts?\\n\\n4. CRITERIA\\n• Is the content congruent with the instructional goal analysis?\\n• Is criteria included only when needed to judge a complex task?\\n• Does criteria include form, physical, aesthetic, and other relevant attributes?\\n\\nFor each criterion, rate as Met, Partially Met, or Not Met with justification. Provide an overall assessment and recommendations.\\n\\nLearning Objectives: [paste your learning objectives]'}]},

{name:'Define Metrics for Evaluation',ic:'barchart',t:'process',desc:'Establish the evaluation framework with specific metrics to measure training effectiveness at multiple Kirkpatrick levels (reaction, learning, behavior, results).',subs:['Define Level 1 (Reaction) metrics','Define Level 2 (Learning) metrics','Define Level 3 (Behavior) metrics','Define Level 4 (Results) metrics','Establish data collection methods per level'],tools:[{n:'Formative Evaluation Plan Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCF7huxTI-fSIxmzVtWKUwbAdbscBKsV6nh1ZEY0IqLEAg?e=nWNAGv'},{n:'Training Proposal Template',link:'https://onedrive.live.com/:w:/g/personal/CC839E3A35A19644/IQCebEEhGdHpTqIOl9Go47Z2AcuMTFJphAwAJIpfLSaqs1w?resid=CC839E3A35A19644!s21416c9ed1194ee9a20e97d1a8e3b676&ithint=file%2Cdocx&e=wd3QVX&migratedtospo=true&redeem=aHR0cHM6Ly8xZHJ2Lm1zL3cvYy9jYzgzOWUzYTM1YTE5NjQ0L0lRQ2ViRUVoR2RIcFRxSU9sOUdvNDdaMkFjdU1URkpwaEF3QUpJcGZMU2FxczF3P2U9d2QzUVZY'}],del:['Formative Evaluation Plan','Training Proposal (partially complete)'],ai:[{ref:'Formative Evaluation Plan Template Completer',prompt:'Complete the attached Formative Evaluation Plan. Design an evaluation framework using Kirkpatrick\'s Four Levels for [topic]. Define metrics, collection methods, timeline, and responsible parties per level.'},{ref:'L1 Survey Designer',prompt:'Create a Level 1 (reaction) survey for an eLearning course on [topic]. Mix Likert scales and open-ended questions.'}]},

{name:'Project Plan + Timeline',ic:'calendar',t:'gate',desc:'Detailed project plan with tasks, milestones, dependencies, resource assignments, and deadlines. Governs execution of remaining ISD phases.',subs:['Estimate duration and effort per task','Identify dependencies and critical path','Assign resources and responsibilities','Create project in Asana'],tools:[{n:'Project Schedule Calculator Claude App',link:'https://alexedaleycreative.github.io/project-schedule-calculator/'},{n:'Project Plan and Timeline Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQA_cue_KsgoQpWU7HF1oolpAXZmVjU1ursG2YaKK-Vszho?e=IYzBUY'},{n:'Project Dashboard Claude Skill'}],del:['Project Dashboard','Project Plan and Timeline'],ai:[{ref:'Project Dashboard Generator',prompt:'You are building a standalone project dashboard app that I can deploy to GitHub Pages. The dashboard pulls live data from my Asana project via a GitHub Action that runs on a schedule, and publishes a static HTML page that stakeholders can view without an Asana login.\n\nStep 1: Gather project information\nBefore building anything, ask me for the following information one step at a time. Do not proceed until each step is answered.\n\n1a. Project name\nAsk: "What is the name of your Asana project? I\'ll search Asana to find it and map the tasks."\nOnce I provide the project name, search Asana using the search_objects or get_projects tool to find the matching project. Confirm the project name and GID with me before proceeding. Then use get_project (with include_sections: true) and get_tasks (with full custom fields, memberships, assignee, and num_subtasks) to understand the project structure — sections, custom field names, task statuses, and date fields.\n\n1b. Brand colors\nAsk: "What are your brand colors? I need a primary color (used for the header and accents) and a secondary color (used for highlights and emphasis). Provide hex codes (e.g., #FA4628)."\n\n1c. Project summary\nAsk: "Paste a 200-word-max summary of the business problem this project addresses. This appears at the top of the dashboard."\n\n1d. Key Dates document\nAsk: "Upload your Key Dates document. This should contain project milestones with target dates and notes. I\'ll parse it and build the Key Dates table."\nParse the uploaded document (Word, PDF, or text) to extract milestone names, target dates, and notes. Build a KEY_DATES JavaScript array from the parsed data.\n\n1e. Stakeholder and SME Involvement Calendar\nAsk: "Upload your Stakeholder and SME Involvement Calendar. This should list dates, who is involved, what action is required, and which items are sign-off gates. I\'ll parse it and build the What I Need From You section."\nParse the uploaded document to extract dates, stakeholder names, required actions, and gate indicators. Build a STK_EVENTS JavaScript array from the parsed data.\n\n1f. Dashboard owner\nAsk: "Who should be listed as the project owner on the dashboard?"\n\nStep 2: Explore the Asana project structure\nUsing the Asana MCP connector, gather:\n• Project GID and current status color\n• All sections with their GIDs (for correct ordering in the Gantt chart)\n• All tasks with these opt_fields: name, due_on, start_on, completed, assignee, assignee.name, custom_fields, custom_fields.name, custom_fields.display_value, custom_fields.type, memberships.section.name, memberships.section.gid, num_subtasks\n• Custom field mapping: Identify which custom fields correspond to Status (enum), Due Date (date), Start Date (date), % Done (number), Estimated Hours (number, optional), Actual Hours (number, optional)\nConfirm the custom field names with me if they don\'t match common patterns. The dashboard depends on correctly mapping these fields.\n\nStep 3: Build the GitHub Pages app\nGenerate a complete app with this file structure:\nproject-dashboard/\n  .github/workflows/deploy.yml  (GitHub Action: cron schedule + manual trigger)\n  scripts/build.js              (Node script: fetches Asana API, generates static HTML)\n  template.html                 (Dashboard HTML template with data placeholder)\n  package.json                  (Minimal package.json with build script)\n  README.md                     (Step-by-step setup instructions for GitHub beginners)\n\ntemplate.html requirements:\nThe dashboard must include these sections in this order:\n1. Header: Project name, Project Dashboard with Owner, status badge (On Track/At Risk/Off Track based on Asana project status color), progress bar with completion percentage at title-weight font size. Include Last updated timestamp below the status row.\n2. Project Summary: The business problem summary. Card with clipboard icon.\n3. Stats Row: Five stat cards — Total Tasks, Completed, In Progress, Late Starts (Not Started but past start date), Due This Week.\n4. What I Need From You: Stakeholder involvement table filtered to next 30 days. Sign-off gates highlighted with a gate tag. Past events hidden. Shows empty-state message when none upcoming.\n5. Key Dates: Milestone table with target dates, notes, and status indicators. Past milestones with strikethrough and reduced opacity.\n6. Project Timeline (Gantt): Interactive horizontal bar chart grouped by Asana sections in correct order. Month header grid, color-coded bars by status, progress fill based on % Done, expandable subtask drill-down, TODAY marker overlay, hover tooltips, diamond milestone markers for tasks without start dates.\n7. Two-column bottom row: Due This Week (tasks due Mon-Sun with TODAY and OVERDUE flags) and In Progress (On Track tasks plus Potential Delays subsection for Not Started tasks past their start date).\n\nStyling rules:\n• Use brand colors: primary for header gradient and accents, secondary for highlights and section backgrounds\n• All Project Timeline text must be black (#000000)\n• Status badge and progress bar should have thin white border for contrast against header\n• Responsive two-column layout that collapses to single column on mobile\n• Clean card-based design with subtle borders and shadows\n\nData handling:\n• All data comes from a DASHBOARD_DATA global variable injected at build time\n• Template uses var DASHBOARD_DATA = /*__DASHBOARD_DATA__*/null; as placeholder\n• Key Dates and Stakeholder Events are hardcoded arrays (not fetched from Asana)\n• parseTask() function must map custom field names to the correct fields identified in Step 2\n• Section ordering must use a hardcoded GID array matching the project\'s actual section order\n• Subtask expansion reads from a pre-fetched subtaskMap object — no API calls at view time\n\nbuild.js requirements:\n• Fetch project metadata, all tasks (with pagination), and pre-fetch all subtask details\n• Use the Asana REST API (https://app.asana.com/api/1.0)\n• Auth via ASANA_TOKEN environment variable (Bearer token)\n• Replace /*__DASHBOARD_DATA__*/null in template.html with the JSON data blob\n• Output to dist/index.html\n\ndeploy.yml requirements:\n• Triggers: schedule (cron every 30 minutes), push to main, workflow_dispatch\n• Set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true as a top-level env var\n• Use Node.js 22\n• Deploy using GitHub Pages actions (configure-pages, upload-pages-artifact, deploy-pages)\n• Permissions: contents: read, pages: write, id-token: write\n\nREADME.md requirements:\nWrite detailed, beginner-friendly setup instructions assuming no prior GitHub experience. Include:\n• Prerequisites (GitHub account, GitHub Desktop, Asana token)\n• Step-by-step: create repo, generate Asana token, upload files via GitHub Desktop (with note about hidden .github folder), add ASANA_TOKEN secret, enable GitHub Pages, trigger first build, find the dashboard URL\n• Troubleshooting: common errors (missing token, build failures)\n• How to change refresh frequency\n• Note about public vs. private repo implications for sharing\n\nStep 4: Deliver\nSave all files to the outputs folder and present them to me using present_files. Provide the folder structure so I can push it to GitHub.'},{ref:'Project Plan Template Completer',prompt:'Complete the attached Project Plan and Timeline Template using the information I provide. Map what I share into each section of the template:\n\n• Project Summary — client, project title, project type, and a brief overview; for projects already in progress, note work completed and any outstanding items or risks\n• Stakeholders & Approval Process — name, role, approval level and responsibilities, and availability for each stakeholder\n• Subject Matter Experts — name, area of expertise, role, availability and time commitment, and preferred contact and response turnaround\n• Collaboration & Communication — best method(s) for communicating project updates and whether legal approval is required prior to launch\n• Check-Ins — frequency, format, and participants\n• Feedback Process — how drafts are shared and reviewed, review period, feedback format, and how scope changes are handled\n• Timeline — target date for each milestone\n• Risk Management — risks, their impact, and mitigation strategies\n• File Organization — where production and final files are stored\n\nLeave any field I have not provided blank and flag it. After completing the template, add three clearly labeled sections:\n• GAPS — missing information still needed to finalize the plan\n• RISKS — scheduling, resourcing, or scope risks worth surfacing\n• QUESTIONS FOR STAKEHOLDERS & SMEs — specific questions to confirm details and close the gaps\n\nProject Information: [paste or attach the project details, meeting notes, or Project Summary]\nProject Plan and Timeline Template: [attach template]'}]},

{name:'Training Proposal',ic:'document',t:'gate',signoff:true,meeting:true,desc:'Formal document presenting the recommended training solution, including scope, objectives, delivery method, timeline, budget, and resources. Serves as the funding gate. Includes a stakeholder review and sign-off meeting to walk through the proposal, discuss scope, budget, and delivery approach, address questions, and obtain official approval to proceed into full design and development.',subs:['Compile analysis into proposal narrative','Define delivery modality and approach','Develop budget estimate and resource plan','Create preliminary timeline','Distribute Training Proposal in advance for review','Present executive summary and business case','Walk through proposed solution, timeline, and budget','Address stakeholder questions and concerns','Obtain formal sign-off or document required revisions'],tools:[{n:'Training Proposal Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCebEEhGdHpTqIOl9Go47Z2AcuMTFJphAwAJIpfLSaqs1w?e=wd3QVX'}],del:['Training Proposal (completed in full + approved)','Training Proposal Meeting Summary'],ai:[{ref:'Training Proposal Template Creator',prompt:'Complete the attached Training Proposal for [project]. Include: executive summary, business case, objectives, approach, modality, timeline, budget, success metrics. Details: [provide].'},{ref:'Training Proposal Evaluator',prompt:'Evaluate the attached Training Proposal for completeness, clarity, and stakeholder readiness. Assess the following sections: executive summary, business case/problem statement, instructional goals, proposed solution and delivery modality, target audience, project timeline, budget estimate, resource requirements, success metrics, and risk mitigation. For each section, rate as Strong, Adequate, or Needs Improvement with specific feedback. Flag any missing sections, unsupported claims, or areas likely to draw stakeholder objections. Provide a prioritized list of revisions before submission.\n\nTraining Proposal: [attach or paste your Training Proposal]'},{ref:'Training Proposal Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Training Proposal Review and Sign-off Meeting.\n\nUsing the attached Training Proposal and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the business problem and performance gap\n• Highlights the proposed training solution, delivery modality, and target audience\n• Outlines the project timeline, budget, and resource requirements\n• Identifies key decision points stakeholders should consider\n• Lists specific questions or items requiring stakeholder input during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nTraining Proposal: [attach or paste your Training Proposal]\nProject Summary: [attach or paste your Project Summary]'},{ref:'Training Proposal Presentation',prompt:'Create a stakeholder-facing presentation based on the attached completed Training Proposal. Keep it to a maximum of 10 slides, written for decision-makers rather than instructional designers.\n\nSuggested flow: title, the business problem/performance gap, recommended training solution, scope & approach, target audience, delivery modality, timeline/milestones, budget/resources, expected outcomes & success measures, and a clear ask/sign-off slide.\n\nMatch the client\'s branding — fonts, colors, logo placement, and slide layouts — using the attached PowerPoint template and/or brand kit. If I have not provided a brand example, ask me to share the client\'s PowerPoint template or brand kit before generating the presentation.\n\nTraining Proposal: [attach completed Training Proposal]\nBrand / Template: [attach PowerPoint template and/or brand kit]'},{ref:'Training Proposal Meeting Invite and Agenda',prompt:'Generate a calendar invite for a Training Proposal Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, untimed meeting agenda covering:\n   • Executive summary and business case\n   • Proposed solution and delivery modality\n   • Target audience overview\n   • Project timeline and key milestones\n   • Budget and resource requirements\n   • Risks and concerns\n   • Q&A and discussion\n   • Formal sign-off\n\nPurpose: Review the Training Proposal — including scope, objectives, delivery approach, timeline, and budget — and obtain formal stakeholder sign-off to proceed.\nDesired Outcome: Approved Training Proposal with documented decisions and authorization to move into full design and development.\n\nProject Summary: [attach or paste your Project Summary, or describe the project]'},{ref:'Training Proposal Meeting Summary',prompt:'Draft a post-meeting email confirming Training Proposal sign-off, summarizing key decisions and approved scope: [paste meeting notes]'}]}
]},

// ── PHASE 3: LEARNING SOLUTION ──
{n:'03',name:'Learning Solution',desc:'Create and build the learning solution',rte:{title:'Review, Test, and Evaluate',desc:'Multiple quality gates occur during Learning Solution. Deliverables are peer/SME reviewed, stakeholder-approved, and confirmed aligned to objectives before advancing to execution.'},items:[
{name:'Develop Assessments',ic:'checkmark',t:'process',desc:'Design assessment instruments that directly measure learner achievement of each objective. Includes knowledge checks, performance assessments, pre/post tests, and rubrics.',subs:['Create items aligned to each objective','Develop rubrics and scoring criteria','Design formative assessments (knowledge checks)','Design summative assessments (final tests)','Write clear instructions and feedback'],tools:[{n:'Course Design Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDQM4kZvKQUSZ8lJ7qdHoOpAURMpoTA4e5018Ie7YrBIy8?e=fQ7F0H'}],del:['Course Design (partially complete)'],ai:[{ref:'Assessment Ideas Generator',prompt:'Generate creative and effective assessment ideas for the following course. For each learning objective, suggest at least two assessment types (e.g., scenario-based, multiple choice, performance task, drag-and-drop, matching, simulation, case study, reflection).\n\nFor each assessment idea, include:\n• Assessment type and format\n• Brief description of the activity\n• Which objective it measures\n• Bloom\'s Taxonomy level targeted\n• Estimated learner time\n\nIf the instructional goal and learning objectives are not provided below, ask me to provide them before generating ideas.\n\nInstructional Goal: [paste your instructional goal]\nLearning Objectives: [paste your learning objectives]'},{ref:'Assessment Item Generator',prompt:'Create assessment items for these objectives: [list]. For each: 1 scenario-based, 1 multiple-choice, 1 performance task. Include answer keys.'},{ref:'Rubric Designer',prompt:'Design a rubric for [task]. Include criteria, 4-point scale, detailed descriptions per level.'}]},

{name:'Design Instructional Strategy',ic:'playbook',t:'process',desc:'Define the overall instructional approach — sequencing, delivery methods, engagement strategies, practice design, chunking, and pacing. Ensures the experience is pedagogically sound.',subs:['Select strategies aligned with objective types','Define content sequencing and scaffolding','Design practice and feedback mechanisms','Plan engagement and motivation strategies','Determine chunking and pacing for modality'],tools:[{n:'Course Design Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDQM4kZvKQUSZ8lJ7qdHoOpAURMpoTA4e5018Ie7YrBIy8?e=fQ7F0H'}],del:['Course Design (partially complete)'],ai:[{ref:'Strategy Architect',prompt:'Design an instructional strategy for [topic] for [audience]. Objectives: [list]. Recommend sequencing, practice, engagement, chunking. Justify each.'},{ref:'Strategy Comparison',prompt:'Suggest three instructional strategy approaches and compare strengths for my audience: [details]'}]},

{name:'Draw Adaptive Learning Paths',ic:'fork',t:'process',desc:'Design branching or adaptive pathways that personalize the learner experience based on pre-assessment results, role, or in-course performance.',subs:['Define learner segments or personas','Map content paths for each segment','Design branching logic based on assessment','Create remediation paths for struggling learners','Plan acceleration paths for advanced learners'],tools:[{n:'Miro',link:'https://www.miro.com'}],del:['Course Design (partially complete)'],ai:[{ref:'Adaptive Path Designer',prompt:'Design adaptive learning paths for [topic]. Three audience segments: [describe]. Map personalized paths with branching, remediation, and acceleration.'},{ref:'Pre-Assessment Branching Logic',prompt:'Create a decision tree for adaptive branching after a pre-assessment. Define score thresholds and content differences.'}]},

{name:'Course Design and Storyboard',ic:'film',t:'gate',signoff:true,meeting:true,desc:'Create the detailed, screen-by-screen blueprint of the learning experience — mapping content, interactions, assessments, media, and navigation for each module using Gagné\'s 9 Events as a framework. Includes a stakeholder and SME review meeting to walk through the completed course design, storyboard, and project schedule, ensuring content accuracy and instructional approach are approved before development begins.',subs:['Organize content into modules, lessons, screens','Write on-screen text, narration, interaction descriptions','Specify media requirements','Map interactions, practice, branching logic','Include assessment items per objective','Apply Gagné\'s 9 Events as framework','Distribute course design/storyboard and project schedule in advance for stakeholder and SME review','Walk through course structure, content flow, and interactions','Review assessment strategy and alignment to objectives','Review project schedule, milestones, and dependencies','Collect feedback and obtain formal sign-off to proceed to development','Create stakeholder/SME project chat in Microsoft Teams — share Project Dashboard, Course Design, and Storyboard'],tools:[{n:'Course Design Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDQM4kZvKQUSZ8lJ7qdHoOpAURMpoTA4e5018Ie7YrBIy8?e=fQ7F0H'},{n:'Storyboard Template'}],del:['Course Design (completed + approved)','Course Design/Storyboard Meeting Summary','Project Schedule (approved)','Storyboard (completed + approved)'],ai:[{ref:'Course Design Template Completer',prompt:'Using all of the attached materials — the Training Proposal, my Thoughts document about the course design, any existing content, and meeting summaries — complete the Course Design Template. Synthesize these sources into the template\'s sections: learning goals and objectives, module/lesson structure, instructional strategy, content outline, interactions and practice, assessment approach, media requirements, and delivery modality. Where sources conflict or information is missing, flag it rather than inventing details.\n\nAttachments: [attach Training Proposal, Thoughts document, existing content, and meeting summaries]\nCourse Design Template: [attach template]'},{ref:'Course Design Review Presentation',prompt:'Convert the attached completed Course Design document into a presentation I can deliver to stakeholders and SMEs in about 30 minutes. It should clearly walk through how I plan to design the course and what that entails: the learning goals and objectives, the module/lesson structure and flow, the instructional strategy and engagement approach, the assessment strategy, media and interaction plans, and the development timeline. Include brief speaker notes for each slide and pace the content for a ~30-minute talk.\n\nMatch the branding I specify — fonts, colors, logo, and layouts. If I have not provided a brand example, ask me to share the brand kit or PowerPoint template before generating the presentation.\n\nCourse Design Document: [attach completed Course Design]\nBrand / Template: [attach brand kit and/or PowerPoint template]'},{ref:'Course Design Review Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Course Design/Storyboard and Project Schedule/Timeline Review and Sign-off Meeting.\n\nUsing the attached Course Design/Storyboard and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the course structure, modules, and content flow\n• Highlights the instructional strategy, engagement approach, and assessment design\n• Outlines the project schedule with key milestones and dependencies\n• Identifies areas where stakeholder or SME input is needed\n• Lists specific questions or items requiring stakeholder feedback during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nCourse Design/Storyboard: [attach or paste your Course Design/Storyboard]\nProject Summary: [attach or paste your Project Summary]'},{ref:'Course Design Review Meeting Invite and Agenda',prompt:'Generate a calendar invite for a Course Design/Storyboard and Project Schedule/Timeline Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Walk through the completed course design/storyboard and project schedule to validate content, instructional approach, and timeline before development begins.\nDesired Outcome: Approved course design/storyboard and project schedule with formal sign-off to proceed to development.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Course Design Review Meeting Summary',prompt:'Summarize the attached Course Design Review Meeting transcript into a stakeholder-ready meeting summary formatted as a Word document.\n\nUsing the attached transcript as a reference, organize the summary as follows:\n\n1. MEETING OVERVIEW\n• Date, attendees, and topic covered\n• Brief summary of the course design/storyboard and project schedule reviewed\n\n2. KEY TAKEAWAYS\n• Summarize the main points discussed\n• Highlight feedback on course structure, instructional strategy, assessments, media, and the project schedule\n\n3. DECISIONS & NEXT STEPS\n• Sign-off status and any approved changes\n• Revisions or follow-ups required before development begins\n• Open questions or items requiring stakeholder or SME input\n\nFormatting: Use headers, bold text, and bullet points for scannability. Keep the tone professional and concise.\n\nCourse Design Review Meeting Transcript: [paste or attach your meeting transcript]'},{ref:'Storyboard Builder',prompt:'Create a storyboard outline for a module on [topic]. Per screen: title, text, narration, interaction, media, objective addressed. Use Gagné\'s 9 Events.'},{ref:'Voiceover Script Writer',prompt:'Generate a voiceover script as a Word document (.docx) using the following table format:\n\nColumns: No. | Scene Description | Voiceover Script | Visuals\n\nFor each scene/screen, provide:\n• No.: Sequential scene number\n• Scene Description: Brief description of what is happening on screen\n• Voiceover Script: The exact narration text to be recorded\n• Visuals: Description of on-screen graphics, animations, or text that accompany the narration\n\nGuidelines:\n• Write in a conversational, professional tone unless otherwise specified\n• Keep each scene\'s narration to 30-60 seconds (approximately 75-150 words)\n• Ensure narration complements rather than duplicates on-screen text\n• Include transition cues between scenes\n\nCourse Topic: [describe your course topic]\nTone/Style: [conversational, formal, friendly, etc.]\nStoryboard/Content: [paste your storyboard or course outline]'}]},

{name:'Formative Evaluation',ic:'flask',t:'gate',signoff:true,meeting:true,desc:'Plan and validate how the course will be evaluated during development through one-to-one reviews, small-group trials, and expert reviews. Define evaluation stages, instruments, participants, and revision criteria. Includes a stakeholder review and sign-off meeting to confirm the evaluation plan before beginning formative evaluation activities.',subs:['Define evaluation stages (one-to-one, small group, field trial)','Identify evaluators per stage','Create evaluation instruments and checklists','Establish timelines per round','Define revision criteria and thresholds','Distribute Formative Evaluation Plan in advance for stakeholder review','Present evaluation stages and methodology','Review evaluation instruments and checklists','Confirm evaluator assignments and timelines','Obtain formal sign-off on the plan'],tools:[{n:'Formative Evaluation Plan Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCF7huxTI-fSIxmzVtWKUwbAdbscBKsV6nh1ZEY0IqLEAg?e=nWNAGv'}],del:['Formative Evaluation Meeting Summary','Formative Evaluation Plan (completed + approved)'],ai:[{ref:'Formative Evaluation Plan Completer',prompt:'Complete the attached Formative Evaluation Plan Template for a [topic] eLearning course. Fill out every section of the template, defining the three evaluation stages — one-to-one, small-group ([N] learners), and field trial — and for each stage specify the purpose, participants, data collection methods and instruments, timeline, and revision criteria and thresholds.\n\nWhere information is missing, flag it rather than inventing details.\n\nFormative Evaluation Plan Template: [attach template]\nSupporting Materials: [attach course design, objectives, or project summary as available]'},{ref:'Formative Evaluation Plan Evaluator',prompt:'Evaluate the attached Formative Evaluation Plan for quality and effectiveness. Assess it against both Kirkpatrick\'s Four Levels of Evaluation and Phillips\' ROI Methodology.\n\nAssess the following:\n• Are the evaluation stages clearly defined (one-to-one, small group, field trial)?\n• Are appropriate data collection methods specified per stage?\n• Are the evaluation instruments aligned with the learning objectives?\n• Does the plan address all four Kirkpatrick levels (Reaction, Learning, Behavior, Results)?\n• Does the plan consider Phillips\' Level 5 (ROI) where applicable?\n• Are revision criteria and thresholds clearly defined?\n• Are evaluator roles and timelines realistic?\n• Are there gaps in what is being measured?\n\nFor each area, rate as Strong, Adequate, or Needs Improvement with specific feedback, then provide a prioritized list of recommended improvements.\n\nFormative Evaluation Plan: [attach or paste your plan]'},{ref:'Formative Evaluation Review Meeting Invite and Agenda',prompt:'Generate a calendar invite for a Formative Evaluation Plan Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, untimed meeting agenda covering:\n   • Introductions and roles\n   • Overview of the evaluation approach and methodology\n   • Review of each evaluation stage (one-to-one, small group, field trial), participants, and timeline\n   • Review of evaluation instruments and data collection methods\n   • Revision criteria and decision thresholds\n   • Q&A and discussion\n   • Formal sign-off\n\nPurpose: Review the Formative Evaluation Plan — including evaluation stages, participants, instruments, and revision criteria — and obtain formal sign-off before beginning formative evaluation activities.\nDesired Outcome: Approved Formative Evaluation Plan with sign-off to proceed with evaluation.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Formative Evaluation Review Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Formative Evaluation Plan Review and Sign-off Meeting.\n\nUsing the attached Formative Evaluation Plan and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the evaluation approach and methodology\n• Highlights each evaluation stage (one-to-one, small group, field trial) with participants and timeline\n• Outlines the evaluation instruments and data collection methods\n• Identifies revision criteria and decision thresholds\n• Lists specific questions or items requiring stakeholder input during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nFormative Evaluation Plan: [attach or paste your Formative Evaluation Plan]\nProject Summary: [attach or paste your Project Summary]'},{ref:'One-to-One Protocol Designer',prompt:'Design a one-to-one evaluation protocol. Include think-aloud instructions, observation checklist, post-session interview questions.'}]},

{name:'SME Interviews for Content Deep Dives',ic:'messages',t:'milestone',meeting:true,desc:'Structured interviews with subject matter experts to gather detailed, accurate content for course development. Focuses on extracting expert knowledge, real-world scenarios, common misconceptions, and edge cases that inform the learning experience.',subs:['Identify SMEs by content area and schedule interviews','Prepare interview guides with targeted questions per topic','Conduct interviews and record (with permission)','Document key content, examples, and scenarios','Validate captured content with SMEs for accuracy'],tools:[],del:['Meeting transcript or notes','SME Interview Meeting Summary'],ai:[{ref:'SME Interview Guide',prompt:'Create an SME interview guide for a course on [topic]. Include questions that extract: key concepts, common mistakes, real-world scenarios, decision-making processes, and expert tips. Format as a structured interview protocol.'},{ref:'SME Interview Meeting Invite and Agenda',prompt:'Generate a calendar invite for an SME Interview for Content Deep Dives. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the interview and the expected outcome\n2. A high-level, non-timed agenda for the interview session\n\nPurpose: Conduct a structured interview to gather detailed content, real-world scenarios, common misconceptions, and edge cases from this subject matter expert for course development.\nDesired Outcome: Documented expert knowledge, validated examples, and accurate content ready for course development.\n\nProject Summary: [attach or paste your Project Summary]\nSME topic area: [describe the specific content area this SME will cover]'},{ref:'SME Interview Meeting Summary',prompt:'Summarize the attached SME interview transcript or meeting notes into a stakeholder-ready meeting summary formatted as rich text that can be copied and pasted directly into an email or Microsoft Teams message.\n\nUsing the attached Course Design or Storyboard as a reference, organize the summary as follows:\n\n1. MEETING OVERVIEW\n• Date, attendees, and topic covered\n• Brief summary of the interview\'s purpose and scope\n\n2. KEY TAKEAWAYS\n• Summarize the main points discussed\n• Highlight critical content, expert insights, real-world examples, common misconceptions, and edge cases shared by the SME\n\n3. CONTENT MAPPED TO COURSE DESIGN / STORYBOARD\n• For each relevant module or lesson in the attached Course Design or Storyboard, identify what information from this interview applies\n• Flag new content, clarifications, or examples that should be incorporated into development\n• Note any contradictions or discrepancies with existing course content\n\n4. ACTION ITEMS & NEXT STEPS\n• Follow-up questions for the SME\n• Content gaps that still need to be addressed\n• Decisions needed before development can proceed\n• Any items requiring stakeholder input\n\nFormatting: Use headers, bold text, and bullet points for scannability. Keep the tone professional and concise.\n\nTranscript / Meeting Notes: [attach or paste your transcript or meeting notes]\nCourse Design / Storyboard: [attach or paste your Course Design or Storyboard]'}]},

{name:'Develop Instructional Materials',ic:'imgstack',t:'process',desc:'The core production phase — build all content, interactions, assessments, and multimedia in the authoring tool. Typically the longest and most resource-intensive phase.',subs:['Build course structure and navigation','Develop on-screen content and interactions','Write scripts and produce voiceover','Develop activities and practice exercises','Write assessment feedback','Produce and integrate multimedia','Apply accessibility and UDL principles','Design navigation and UI elements','Conduct internal quality checks'],tools:[{n:'Revision Tracker (ID) Template',link:'https://1drv.ms/x/c/cc839e3a35a19644/IQA8zFpo6FRbTImehefPhfNHAQMH9ebrumBz2FW2GKJRGfo?e=NBU1l5'},{n:'Revision Tracker (SME) Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQBviO08KbOKS5k2b5XgVk4_AVW2SHYobTrX0tNiI8e5fZQ?e=cPIyNn'},{n:'Adobe Creative Cloud',link:'https://www.adobe.com/creativecloud.html'},{n:'Articulate 360',link:'https://id.articulate.com/redirect/login'},{n:'ChatGPT',link:'https://chatgpt.com'},{n:'Claude AI',link:'https://claude.ai'},{n:'ElevenLabs',link:'https://elevenlabs.io'},{n:'Envato',link:'https://www.envato.com'},{n:'GitHub',link:'https://github.com'},{n:'Synthesia',link:'https://www.synthesia.io'},{n:'TinyPNG',link:'https://tinypng.com'}],del:['All multimedia assets','Developed eLearning course files','Interaction source files','Narration audio files'],ai:[{ref:'Articulate Rise Builder',prompt:'Using the attached Course Design/Storyboard, create a complete, block-by-block build plan for an Articulate Rise course. Map every component of the course — intro, each lesson, and the conclusion — to the exact Rise block(s) to use (e.g., Text, Statement, Image & Text, Flashcard Grid, Accordion, Tabs, Labeled Graphic, Process, Sorting Activity, Scenario, Knowledge Check, Quiz, Continue/Divider). For each block, specify:\n\n• BLOCK TYPE — the exact Rise block to insert\n• CONTENT — the on-screen text/media that goes in it, written out in full\n• CUSTOM EMBEDS — where any custom embeds (Storyline blocks, HTML/iframe embeds, interactive widgets) slot in and what they contain\n• SCREENSHOT NEEDED — note if a screenshot or visual asset must be gathered from an SME\n\nFor every piece of on-screen text, also provide a matching voiceover script so learners can choose to read or listen:\n• READ version — brief, scannable, to-the-point on-screen text\n• LISTEN version — a warmer, conversational narration of the same content\n\nFormat the entire plan with clickable checkboxes (- [ ]) for each block and component so I can check them off as I build and implement them in Rise. Use a nested checklist: one checkbox per block, with sub-checkboxes for content entry, voiceover, and any custom embeds.\n\nAt the end, compile a single consolidated SME SCREENSHOT LIST — every screenshot or visual asset I need to request from SMEs, with a short description of what each should show and which block it belongs to.\n\nMatch the course branding (fonts, colors, logo, tone) using the brand assets provided in this project. If no branding has been provided, ask me to add it to the project before building the plan.\n\nCourse Design/Storyboard: [attach Course Design/Storyboard]'},{ref:'Instructor Guide Builder',prompt:'Generate a branded Instructor Guide (facilitator guide) as a Word document (.docx) based on the content I attach.\n\nUsing the attached content — course materials, storyboard, slides, outline, or SME notes — write a complete instructor guide a facilitator could teach from. Include: course overview and learning objectives, target audience and prerequisites, required materials and setup/logistics, a timed agenda, section-by-section facilitation notes (talking points, activities, discussion questions, timing, and transitions), knowledge-check/assessment guidance, and a wrap-up.\n\nFormatting:\n• Match the LAYOUT and structure of the attached Instructor Guide template — use its section organization, heading hierarchy, and table/format arrangement only. Do NOT reuse its colors or specific icons.\n• Apply the client\'s branding kit (fonts, colors, logo) for all visual styling. If no client branding is provided or stated, default to Alex E. Daley Creative (AEDC) branding.\n\nContent: [attach the course content to build the guide from]\nInstructor Guide Template: [attach the Instructor Guide template — layout reference only]\nBranding: [attach the client brand kit, or leave blank to use AEDC branding]'},{ref:'Scenario Interaction Builder',prompt:'Create a scenario-based branching interaction for [skill]. Include setup, 3 decision points, consequences, feedback.'}]},

{name:'Conduct Alpha "Wireframe" Testing',ic:'laptop',t:'process',desc:'Internal testing of the near-final build to identify functional issues, content errors, and usability problems before SME review. Focuses on technical functionality and UX.',subs:['Define alpha test plan and test cases','Recruit internal testers','Execute tests across target platforms','Document bugs, issues, enhancement requests','Address critical issues before beta'],tools:[{n:'eLearning Quality Checklist',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDrVidfN3x6RYVa8cp0fG9KAawVhAVDjyk7fOUxDQjxrrQ?e=k1l2jO'}],del:['Alpha test report','Bug/issue log','Revised course build'],ai:[{ref:'Alpha Test Case Generator',prompt:'Create alpha test cases for an eLearning course. Cover: navigation, interactions, scoring, branching, media, SCORM/xAPI tracking, accessibility. Format as spreadsheet.'}]},

{name:'Conduct Beta (SME + Stakeholder) Testing',ic:'eye',t:'process',desc:'Formal review by SMEs and stakeholders to validate content accuracy, relevance, and business alignment. This is the content sign-off stage.',subs:['Distribute course with review guidelines','Provide SME review checklist','Collect and consolidate feedback','Conduct stakeholder walkthrough','Implement revisions','Obtain formal sign-off'],tools:[],del:['Revised course build','SME review feedback log'],ai:[{ref:'Feedback Prioritizer',prompt:'Consolidate and prioritize this SME feedback. Categorize as: critical, important, nice-to-have: [paste feedback]'},{ref:'SME Review Request Email',prompt:'Draft an email to SMEs requesting course review. Include focus areas, feedback method, deadline, checklist link.'}]}
]},

// ── PHASE 4: EXECUTE ──
{n:'04',name:'Execute',desc:'Deliver and implement the solution',rte:{title:'Review, Test, and Evaluate',desc:'Post-launch gate. Confirm successful deployment, verify evaluation instruments are in place, and review initial learner data for issues before transitioning to formal evaluation.'},items:[
{name:'Publish Course to LMS',ic:'cloud',t:'process',desc:'Package and deploy the finalized course to the LMS. Configure enrollment, tracking, reporting, and completion criteria.',subs:['Export in required format (SCORM, xAPI, cmi5)','Upload and configure in LMS','Set enrollment rules and availability dates','Configure completion criteria and certificates','Set up reporting dashboards'],tools:[],del:['Enrollment plan','Published course in LMS'],ai:[{ref:'Course Launch Email',prompt:'Draft a course launch email for [audience]. Include: what, why, how to access, deadline, time estimate, support contact.'},{ref:'LMS Publishing Checklist',prompt:'Create a SCORM/xAPI publishing checklist for [LMS name]. Include pre-upload, configuration, and post-upload verification.'}]},

{name:'Conduct Final QA',ic:'lock',t:'gate',signoff:true,desc:'Final quality assurance in the production environment. Verify tracking, scoring, completion, and reporting all function correctly in the real LMS.',subs:['Test complete flow in production LMS','Verify SCORM/xAPI tracking','Test completion and certificate triggers','Verify reporting accuracy','Test across browsers and devices','Final accessibility audit'],tools:[],del:['Final QA test report','Go-live approval','Tracking verification results'],ai:[{ref:'Production QA Test Plan',prompt:'Create a final QA test plan for production LMS. Cover: SCORM tracking, completion, scores, bookmarking, certificates, cross-platform compatibility.'}]},

{name:'Launch Training',ic:'star',t:'milestone',meeting:true,desc:'Internal coordination meeting to finalize launch logistics and confirm readiness, followed by the formal organization-wide training launch. Covers stakeholder and support team alignment on the go-live plan, communication campaigns, enrollment notifications, and day-one monitoring to ensure a smooth rollout.',subs:['Confirm course is published and QA-verified in LMS','Review launch communication plan and timeline','Brief help desk and support teams','Confirm enrollment lists and notifications are ready','Align on monitoring plan for launch day and first week','Execute launch communication plan','Send enrollment notifications','Monitor initial activity','Address day-one issues quickly'],tools:[],del:['Enrollment confirmation','Launch communications (sent)','Launch Meeting Summary','Launch Readiness Checklist'],ai:[{ref:'Launch Day Email',prompt:'Write a launch day email for mandatory training. Include: coverage, importance, access link, deadline, time estimate.'},{ref:'Launch Meeting Agenda',prompt:'Create an agenda for a training launch coordination meeting. The course is: [describe]. Include sections for LMS readiness, communications plan, support team briefing, and day-one monitoring.'},{ref:'Launch Meeting Invite',prompt:'Generate a calendar invite for a Launch Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Finalize launch logistics, confirm readiness across all teams, and align on the go-live plan for the training rollout.\nDesired Outcome: Confirmed launch readiness with all teams aligned on responsibilities, timeline, and escalation plan for launch day and the first week.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Launch Readiness Checklist Generator',prompt:'Create a launch readiness checklist covering: LMS configuration, enrollment, communications, support briefing, monitoring plan, and escalation contacts for [topic] training.'},{ref:'Multi-Channel Launch Plan',prompt:'Create a multi-channel launch plan for [topic] training. Include: email, manager talking points, intranet post, Slack message. Audience: [describe].'}]}
]},

// ── PHASE 5: YIELD ──
{n:'05',name:'Yield',desc:'Measure impact and transition for long-term success',rte:null,items:[
{name:'Summative Evaluation',ic:'piechart',t:'gate',signoff:true,meeting:true,desc:'Comprehensive evaluation using Kirkpatrick levels to determine if training achieved its objectives and impacted business performance. Includes stakeholder review and sign-off on the evaluation plan, confirming metrics, data collection methods, and timeline before executing the evaluation and analyzing results.',subs:['Collect/analyze Level 1 (Reaction) data','Collect/analyze Level 2 (Learning) data','Plan/execute Level 3 (Behavior) collection','Analyze Level 4 (Results) data','Compile evaluation report','Distribute Summative Evaluation Plan in advance','Present evaluation framework and Kirkpatrick-level metrics','Review data collection methods and responsible parties','Confirm evaluation timeline and reporting schedule','Obtain formal sign-off on the plan','Present findings to stakeholders'],tools:[{n:'Summative Evaluation Plan Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCusjSwSs9DTKI-2xz7XAkEAb0a5B6Wiik88mn2c_0P2gM?e=3buQU1'}],del:['Data analysis results','Stakeholder presentation','Summative Evaluation Meeting Summary','Summative Evaluation Plan (completed + approved)'],ai:[{ref:'Eval Plan Sign-off Confirmation',prompt:'Draft a post-meeting email confirming Summative Evaluation Plan sign-off with evaluation timeline and reporting milestones: [paste meeting notes]'},{ref:'Stakeholder Evaluation Presentation',prompt:'Generate a stakeholder presentation that communicates the results of the summative evaluation. The presentation should include:\n\n• Title slide with project name, date, and presenter\n• Executive summary of training objectives and scope\n• Evaluation methodology and data sources\n• Results by Kirkpatrick level (L1: Reaction, L2: Learning, L3: Behavior, L4: Results)\n• Key findings — strengths and areas for improvement\n• Data visualizations (charts/tables for completion rates, assessment scores, survey results)\n• ROI analysis (if applicable)\n• Recommendations and next steps\n• Appendix with detailed data\n\nFormat the output as a slide-by-slide outline with speaker notes for each slide.\n\nYou must provide the Summative Evaluation Plan/Report to generate this presentation. If not provided, ask for it before proceeding.\n\nSummative Evaluation Report: [attach or paste your evaluation report]'},{ref:'Summative Eval Review Agenda',prompt:'Create an agenda for a Summative Evaluation Plan review and sign-off meeting. The plan covers: [describe evaluation approach]. Include sections for reviewing metrics at each Kirkpatrick level, data collection methods, and reporting timeline.'},{ref:'Summative Evaluation Plan Review and Sign-off Meeting Invite',prompt:'Generate a calendar invite for a Summative Evaluation Plan Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Review the Summative Evaluation Plan — including evaluation metrics across Kirkpatrick levels, data collection methods, and timeline — and obtain formal sign-off before executing the evaluation.\nDesired Outcome: Approved Summative Evaluation Plan with sign-off to begin evaluation execution.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Summative Evaluation Plan Review and Sign-off Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Summative Evaluation Plan Review and Sign-off Meeting.\n\nUsing the attached Summative Evaluation Plan and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the evaluation framework and Kirkpatrick-level metrics\n• Highlights data collection methods and responsible parties\n• Outlines the evaluation timeline and reporting schedule\n• Identifies key metrics and thresholds stakeholders should focus on\n• Lists specific questions or items requiring stakeholder input during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nSummative Evaluation Plan: [attach or paste your Summative Evaluation Plan]\nProject Summary: [attach or paste your Project Summary]'},{ref:'Training Data Analyst',prompt:'Analyze this training evaluation data and identify trends, strengths, areas for improvement: [paste data]. Provide Kirkpatrick-level recommendations.'}]},

{name:'Revise Training',ic:'refresh',t:'process',desc:'Based on evaluation data, implement revisions to improve the training — content updates, interaction redesigns, assessment refinements, or structural changes.',subs:['Prioritize revisions from evaluation findings','Plan revision scope and timeline','Implement changes','Re-test revised sections','Re-publish updated course','Document changes in revision tracker'],tools:[],del:['Change log','Completed revision tracker','Revised course build'],ai:[{ref:'Content Clarity Rewriter',prompt:'Rewrite this confusing section. Feedback: [paste]. Original: [paste]. Make clearer while maintaining accuracy.'},{ref:'Revision Priority Planner',prompt:'Create a prioritized revision plan from this feedback. Categorize as: quick wins, medium effort, major redesigns. Include time estimates: [paste feedback].'}]},

{name:'Project Summary and Close Out',ic:'briefcase',t:'milestone',meeting:true,desc:'Comprehensive project documentation capturing the full lifecycle from intake to evaluation results, combined with a formal close-out meeting. The project summary serves as the official record for future reference, while the close-out meeting reviews outcomes, facilitates lessons learned discussion, and formally transitions ownership to the business.',subs:['Compile project metrics (timeline, budget, scope)','Summarize key decisions and outcomes','Include evaluation results and impact data','Document maintenance recommendations','Archive with all project files','Prepare agenda and materials','Present outcomes and evaluation results','Facilitate lessons learned discussion','Document decisions and recommendations','Formally transition ownership'],tools:[{n:'Project Summary Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQBlNVHASXyOQ4gTB5q-9CNSAbhlmvVmVaj465Bmrh7hFIg?e=qQDLn3'}],del:['Close-Out Meeting Summary','Final metrics report','Lessons learned document','Project Summary'],ai:[{ref:'Close-Out Agenda Builder',prompt:'Create an agenda for an ISD close-out meeting. Include: outcome review, evaluation highlights, lessons learned, ownership transition, future recs. Project: [describe].'},{ref:'Close-Out Meeting Invite',prompt:'Generate a calendar invite for a Close-Out Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Review project outcomes, lessons learned, evaluation results, and formally transition ownership of the training to the client or business.\nDesired Outcome: Documented lessons learned, agreed-upon recommendations for future iterations, and formal ownership transition.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Lessons Learned Document',prompt:'Draft a lessons learned document. Went well: [list]. Challenges: [list]. Recommendations: [list].'},{ref:'Project Close-Out Presentation',prompt:'Generate a stakeholder presentation that summarizes the results of the completed ISD project and outlines next steps. The presentation should include:\n\n• Title slide with project name, date, and team\n• Project overview and original business problem\n• Scope and deliverables completed\n• Timeline adherence (planned vs. actual)\n• Budget summary (planned vs. actual)\n• Key accomplishments and milestones achieved\n• Training effectiveness summary (evaluation highlights)\n• Lessons learned\n• Next steps and post-launch plan:\n  - 30-day survey: Initial learner feedback and adoption metrics\n  - 60-day survey: Behavior change and knowledge retention\n  - 90-day survey: Business impact and performance improvement\n• Maintenance and ownership transition plan\n• Acknowledgments and team recognition\n\nFormat as a slide-by-slide outline with speaker notes.\n\nProject Summary: [attach or paste your Project Summary document]'},{ref:'Project Summary Drafter',prompt:'Draft a project summary. Project: [describe]. Metrics: [timeline, budget, scope]. Evaluation: [summary]. Include: overview, scope, milestones, outcomes, evaluation, lessons learned, recommendations.'}]},
