<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISD Model for Online Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#fff;color:#000;min-height:100vh;}

.app{max-width:1100px;margin:0 auto;border:1px solid #aaa;border-radius:12px;overflow:hidden;background:#fff;}

/* ── HEADER ── */
.hdr{padding:22px 28px 18px;border-bottom:2px solid #000;display:flex;align-items:flex-end;justify-content:space-between;}
.hdr h1{font-size:18px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#000;}
.hdr .sub{font-size:9px;font-weight:600;color:#079EB1;letter-spacing:1px;}

/* ── GLASS STAT TILES ── */
.stats{display:flex;border-bottom:1px solid #dadada;}
.stat{flex:1;padding:20px 16px;text-align:center;background:rgba(1,59,70,.04);border-right:1px solid rgba(1,59,70,.08);}
.stat:last-child{border-right:none;}
.stat:hover{background:rgba(7,158,177,.08);}
.stat .sv{font-size:34px;font-weight:900;color:#000;line-height:1;letter-spacing:-1px;}
.stat .sl{font-size:8px;font-weight:800;color:#079EB1;text-transform:uppercase;letter-spacing:2px;margin-top:6px;}

/* ── GLASS PHASE TABS ── */
.tabs{display:flex;border-bottom:1px solid #dadada;}
.tab{flex:1;padding:13px 6px;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:#777;text-align:center;transition:all .2s;background:rgba(1,59,70,.03);border-right:1px solid rgba(1,59,70,.06);}
.tab:last-child{border-right:none;}
.tab:hover{color:#000;background:rgba(7,158,177,.08);}
.tab.active{color:#013B46;background:rgba(7,158,177,.1);}
.tab.active::after{content:'';display:block;width:24px;height:2px;background:#079EB1;margin:6px auto 0;}
.tab .tn{display:block;font-size:7px;color:#079EB1;letter-spacing:1px;margin-bottom:2px;}

/* ── BODY ── */
.body{display:flex;min-height:500px;}
.list{flex:1;overflow-y:auto;max-height:600px;padding:6px;}
.sidebar{width:0;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1);background:#f3f4f6;border-left:1px solid #bbb;}
.sidebar.open{width:380px;}
.sb-inner{width:380px;padding:20px;overflow-y:auto;max-height:600px;}

/* ── RTE BANNER ── */
.rte-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:4px 6px;background:rgba(7,158,177,.07);border:1px dashed rgba(7,158,177,.4);border-radius:6px;}
.rte-icon{width:28px;height:28px;background:#079EB1;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:50%;}
.rte-icon svg{width:14px;height:14px;}
.rte-text{flex:1;}
.rte-title{font-size:10px;font-weight:800;color:#079EB1;text-transform:uppercase;letter-spacing:1px;}
.rte-desc{font-size:9px;color:#555;line-height:1.4;margin-top:2px;}

/* ── LIST CARDS ── */
.card{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;border:1px solid transparent;}
.card:hover{background:#f0f6f7;border-color:#aaa;}
.card.sel{background:#eef7f8;border-color:#079EB1;}
.num{width:30px;height:30px;background:#000;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card.sel .num{background:#079EB1;}
.ic{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.info{flex:1;min-width:0;}
.nm{font-size:13px;font-weight:700;color:#000;line-height:1.3;letter-spacing:.2px;}
.ds{font-size:10px;color:#555;line-height:1.4;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tgs{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap;}
.tg{font-size:7px;font-weight:800;padding:2px 8px;letter-spacing:1.2px;text-transform:uppercase;}
.tg.process{color:#555;border:1px solid #aaa;}
.tg.milestone{color:#079EB1;border:1px solid rgba(7,158,177,.3);}
.tg.gate{color:#000;border:1px solid rgba(0,0,0,.2);background:rgba(0,0,0,.03);}
.tg.dt{color:#079EB1;border:1px solid rgba(7,158,177,.2);}
.tg.meeting{color:#013B46;border:1px solid rgba(1,59,70,.3);background:rgba(1,59,70,.05);}
.tg.signoff{color:#013B46;border:1px solid rgba(1,59,70,.3);background:rgba(1,59,70,.05);}
.arr{color:#999;font-size:18px;align-self:center;transition:color .15s;}
.card:hover .arr{color:#079EB1;}

/* ── SIDEBAR ── */
.sb-x{background:#fff;border:1px solid #aaa;width:28px;height:28px;font-size:13px;cursor:pointer;color:#555;float:right;display:flex;align-items:center;justify-content:center;}
.sb-x:hover{border-color:#079EB1;color:#000;}
.sb-phase{font-size:8px;font-weight:800;color:#079EB1;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px;}
.sb-title{font-size:16px;font-weight:900;color:#000;letter-spacing:.2px;line-height:1.3;padding-right:40px;margin-bottom:6px;}
.sb-rule{width:40px;height:2px;background:#079EB1;margin-bottom:10px;}
.sb-desc{font-size:11px;color:#333;line-height:1.6;margin-bottom:14px;}

.sb-section{margin-bottom:16px;}
.sb-label{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:#013B46;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #ccc;}
.sb-list{list-style:none;padding:0;counter-reset:sbc;}
.sb-list li{font-size:11px;color:#333;line-height:1.55;padding:3px 0 3px 24px;counter-increment:sbc;position:relative;}
.sb-list li::before{content:counter(sbc,decimal-leading-zero);position:absolute;left:0;color:#079EB1;font-size:9px;font-weight:800;}

.sb-tool{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;font-size:10px;font-weight:600;color:#079EB1;border:1px solid rgba(7,158,177,.4);margin:2px 4px 2px 0;text-decoration:none;transition:all .12s;cursor:pointer;}
.sb-tool:hover{background:rgba(7,158,177,.06);border-color:#079EB1;}
.sb-tool svg{width:10px;height:10px;}
.sb-tool-nolink{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;font-size:10px;font-weight:600;color:#333;border:1px solid #aaa;margin:2px 4px 2px 0;}

.sb-del{display:inline-block;background:#fff;border:1px solid #aaa;color:#013B46;padding:4px 12px;font-size:10px;font-weight:600;margin:2px 4px 2px 0;}

/* ── ACCORDION ── */
.acc-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 0;border-bottom:1px solid #ccc;margin-bottom:6px;}
.acc-toggle .sb-label{margin:0;padding:0;border:none;cursor:pointer;}
.acc-chevron{font-size:12px;color:#079EB1;transition:transform .2s;font-weight:700;}
.acc-chevron.open{transform:rotate(180deg);}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s;}
.acc-body.open{max-height:3000px;}

/* ── AI PROMPT CARDS ── */
.ai-card{background:#f5f6f7;border:1px solid #ccc;border-radius:6px;padding:12px;margin-bottom:8px;position:relative;}
.ai-card:hover{border-color:#079EB1;}
.ai-ref{font-size:10px;font-weight:800;color:#000;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.ai-ref::before{content:'';display:inline-block;width:6px;height:6px;background:#079EB1;}
.ai-prompt{font-size:10.5px;color:#333;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;}
.ai-prompt .placeholder{color:#079EB1;font-weight:600;}
.ai-copy{position:absolute;top:8px;right:8px;background:#fff;border:1px solid #dadada;font-size:9px;font-weight:700;color:#555;padding:2px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
.ai-copy:hover{border-color:#079EB1;color:#079EB1;}
.ai-copy.copied{color:#079EB1;border-color:#079EB1;}

/* ── SCROLLBARS ── */
.list::-webkit-scrollbar,.sb-inner::-webkit-scrollbar{width:4px;}
.list::-webkit-scrollbar-thumb,.sb-inner::-webkit-scrollbar-thumb{background:#bbb;border-radius:2px;}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div><h1>ISD Model for Online Learning</h1><div class="sub">Click any milestone to view details, tools, deliverables &amp; AI prompts</div></div>
</div>
<div class="stats" id="stats"></div>
<div class="tabs" id="tabs"></div>
<div class="body">
  <div class="list" id="list"></div>
  <div class="sidebar" id="sb"><div class="sb-inner" id="sbi"></div></div>
</div>
</div>

{name:'Kick-off Meeting',ic:'rocket',t:'milestone',meeting:true,desc:'A structured meeting with stakeholders and SMEs to align on project scope, goals, constraints, timelines, and success criteria. Establishes the foundation for the project and builds early stakeholder buy-in.',subs:['Prepare and distribute meeting agenda','Identify and invite all key stakeholders and SMEs','Clarify business objectives and success criteria','Document decisions, action items, and open questions','Establish communication cadence and project governance'],tools:[{n:'Kick-Off Meeting Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQA1AFS-f1tCR7-GuEOtQNmSAfY36hqt6q6ZOfzIZ3xUsYg?e=EzjC7v'}],del:['Kick-off Meeting Agenda','Project Summary'],ai:[{ref:'Kick-Off Agenda Generator',prompt:'Create an agenda for an instructional design project kick-off meeting. The project is: [describe]. Include time allocations, discussion prompts, and a section for identifying risks.'},{ref:'Post-Meeting Summary Email',prompt:'Based on these kick-off notes, draft a summary email with key decisions, action items, and next steps: [paste notes]'},{ref:'Kick-off Meeting Invite',prompt:'Generate a calendar invite for a Kick-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Align stakeholders and SMEs on project scope, goals, constraints, timelines, and success criteria. Establish the foundation for the project and build early stakeholder buy-in.\nDesired Outcome: Shared understanding of the project, clear roles and responsibilities, and agreement on next steps.\n\nProject Summary: [attach or paste your Project Summary]'}]},

{name:'Performance Analysis',ic:'chart',t:'milestone',desc:'Systematic investigation to determine whether the business problem can be addressed through training or requires a non-training solution (process change, tools, incentives). This is the critical go/no-go gate.',subs:['Define desired vs. current performance state','Identify root causes of the performance gap','Determine knowledge/skill gap vs. environmental issue','Assess organizational readiness','Document findings and recommendation'],tools:[{n:'Performance Analysis Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDsKsBA4aGkQ5WMqY0D-c9AASLH9zyRbJBw63X9ht8P9Mg?e=zGV6cd'}],del:['Performance Analysis Report','Training vs. non-training recommendation'],ai:[{ref:'Root Cause Diagnostic',prompt:'Conduct a root cause analysis for this performance gap: [describe]. Use categories: knowledge/skills, motivation, environment/tools, incentives, capacity. Provide diagnostic questions for each.'},{ref:'Training Recommendation Draft',prompt:'Based on this analysis data, draft a recommendation on whether training is appropriate: [paste data]'}]},

{name:'Performance Analysis Meeting',ic:'people',t:'milestone',meeting:true,desc:'A meeting with key stakeholders and SMEs to present performance analysis findings, discuss root causes, and align on whether the gap warrants a training solution or an alternative intervention.',subs:['Prepare and distribute performance analysis findings in advance','Present desired vs. current performance state','Review root cause analysis results','Discuss training vs. non-training recommendation','Align on next steps and document decisions'],tools:[],del:['Performance Analysis Meeting Notes','Stakeholder Alignment on Recommendation'],ai:[{ref:'Performance Analysis Meeting Agenda',prompt:'Create an agenda for a performance analysis review meeting. The performance gap is: [describe]. Include time allocations for presenting findings, discussing root causes, and deciding on training vs. non-training solutions.'},{ref:'Post-Meeting Summary',prompt:'Based on these performance analysis meeting notes, draft a summary email with key findings, the training/non-training decision, and next steps: [paste notes]'},{ref:'Performance Analysis Meeting Invite',prompt:'Generate a calendar invite for a Performance Analysis Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Present performance analysis findings and align on whether the identified gap warrants a training solution or a non-training intervention.\nDesired Outcome: Stakeholder consensus on root causes and agreement on the recommended path forward.\n\nProject Summary: [attach or paste your Project Summary]'}]},

{name:'Training Decision',ic:'diamond',t:'gate',desc:'The critical decision gate based on performance analysis findings. If the root cause is a knowledge or skill gap, the project continues. If environmental, procedural, or motivational, a non-training solution is proposed.',subs:['Review performance analysis findings','Consult with stakeholders on recommendation','Document the decision rationale','If YES: proceed to Needs Assessment and Analysis','If NO: propose alternative solution and close project'],tools:[{n:'Training Proposal Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCebEEhGdHpTqIOl9Go47Z2AYALluAZA4xOe4-dC87pD7o?e=sf7i57'}],del:['Training Proposal'],ai:[]},

{name:'Identify Instructional Goal(s)',ic:'target',t:'process',desc:'Translate business objectives and performance gaps into clear, measurable instructional goals that define what learners will be able to do after training. These goals drive all subsequent design decisions.',subs:['Review performance analysis and business objectives','Draft instructional goal statements','Validate goals with stakeholders and SMEs','Ensure goals are measurable and observable'],tools:[{n:'Needs Assessment Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQB1wXdXDEHWQofTD9carV0RATf0TjlAjI1V6Gs3q8M8yb8?e=FwCGHx'}],del:['Needs Assessment (partially complete)'],ai:[{ref:'Instructional Goal Converter',prompt:'Convert these business objectives into measurable instructional goals: [list]. Each should describe what the learner will do, under what conditions, and to what standard.'},{ref:'Goal Evaluator',prompt:'Evaluate the following instructional goal(s) against these criteria:\n\n1. CONGRUENCE WITH ORGANIZATIONAL NEEDS\n• Is the goal clearly linked to an identified organizational problem?\n• Is it linked to documented performance gaps?\n• Does it clearly solve the business problem?\n• Do stakeholders approve the goal?\n\n2. CAPACITY\n• Is there sufficient capacity, time, and budget to develop and deliver?\n• Is there an adequate number of learners for testing?\n\n3. CLARITY\n• Does the goal state the intended learner audience?\n• Does it describe what learners will be able to do?\n• Does it describe the conditions under which learners will perform?\n\nFor each criterion, rate as Met, Partially Met, or Not Met with a brief justification. Provide an overall assessment and specific recommendations for improvement.\n\nInstructional Goal(s): [paste your instructional goal(s)]'}]},

{name:'Needs Assessment',ic:'checklist',t:'milestone',desc:'The Needs Assessment encompasses three core analysis activities that together ensure the training solution is grounded in a thorough understanding of the performance gap, the target audience, and the job requirements.',subs:['<strong>Assess Needs and Conduct Instructional Analysis</strong> — Decompose the learning need: goals analysis, subordinate skills analysis, entry-level skills, instructional/performance contexts','<strong>Analyze Learners and Contexts</strong> — Profile target audience, analyze learning context and performance context, define demographics, assess motivations and preferences, identify transfer barriers','<strong>Conduct Job/Skills Analysis</strong> — Interview SMEs and high performers, observe task performance, document task sequences and decision points, identify critical vs. nice-to-have skills, validate with multiple SMEs'],tools:[{n:'Needs Assessment Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQB1wXdXDEHWQofTD9carV0RATf0TjlAjI1V6Gs3q8M8yb8?e=FwCGHx'},{n:'Job Analysis Template',link:'https://1drv.ms/x/c/cc839e3a35a19644/IQAARWg8dteUQ6UbkXgur40tAc7GBBmZlDEeXIuOfkhc-a8?e=0ggG1v'}],del:['Needs Assessment (completed in full)'],ai:[{ref:'Needs Assessment Completer',prompt:'Complete the attached Needs Assessment Template covering instructional analysis, learner analysis, and job/task analysis for a training project on [topic]. For each analysis, define the approach, data collection methods, and expected outputs.'},{ref:'Subordinate Skills Breakdown',prompt:'Conduct a subordinate skills analysis for this goal: [state goal]. Break it into all knowledge and skills organized hierarchically.'},{ref:'Learner Profile Builder',prompt:'Create a learner analysis profile for: [describe audience]. Include prior knowledge, preferences, tech comfort, motivations, and barriers.'},{ref:'Task Analysis Generator',prompt:'Create a task analysis for the role of [job title]. Break down responsibilities into discrete tasks with knowledge, skills, and tools required.'}]},

{name:'Write Learning and Terminal Objectives',ic:'pencil',t:'process',desc:'Transform instructional goals into specific, measurable learning objectives (enabling) and terminal objectives. Well-written objectives drive assessment design, content selection, and instructional strategy.',subs:['Write terminal objective','Decompose into learning objectives','Use ABCD format (Audience, Behavior, Condition, Degree)','Align to Bloom\'s Taxonomy levels','Review with SMEs for accuracy'],tools:[{n:'Training Proposal Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCebEEhGdHpTqIOl9Go47Z2AYALluAZA4xOe4-dC87pD7o?e=juhZOE'}],del:['Training Proposal (partially complete)'],ai:[{ref:'Objective Writer',prompt:'Write learning objectives for [topic]. Terminal objective: [state]. Use Bloom\'s and ABCD format. Generate both terminal and enabling objectives.'},{ref:'Objectives Evaluator',prompt:'Evaluate the following learning objectives against these criteria:\\n\\n1. GOAL STATEMENT\\n• Does it describe the ultimate performance context?\\n• Is the context authentic and realistic?\\n\\n2. BEHAVIORS\\n• Is the behavior congruent with the instructional goal?\\n• Does it describe actions learners perform (not how they respond to learning)?\\n• Is the behavior clear and observable?\\n\\n3. CONDITIONS\\n• Do conditions specify cues or stimulus provided to learners?\\n• Do conditions specify resources and tools needed?\\n• Do conditions control task complexity based on learners\' needs?\\n• Do conditions aid transfer of learning to performance contexts?\\n\\n4. CRITERIA\\n• Is the content congruent with the instructional goal analysis?\\n• Is criteria included only when needed to judge a complex task?\\n• Does criteria include form, physical, aesthetic, and other relevant attributes?\\n\\nFor each criterion, rate as Met, Partially Met, or Not Met with justification. Provide an overall assessment and recommendations.\\n\\nLearning Objectives: [paste your learning objectives]'}]},

{name:'Training Proposal',ic:'document',t:'gate',signoff:true,desc:'Formal document presenting the recommended training solution for stakeholder approval. Includes scope, objectives, delivery method, timeline, budget, and resources. Often the funding gate.',subs:['Compile analysis into proposal narrative','Define delivery modality and approach','Develop budget estimate and resource plan','Create preliminary timeline','Present to stakeholders for approval'],tools:[{n:'Training Proposal Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCebEEhGdHpTqIOl9Go47Z2AcuMTFJphAwAJIpfLSaqs1w?e=wd3QVX'}],del:['Training Proposal'],ai:[{ref:'Training Proposal Builder',prompt:'Complete the attached Training Proposal for [project]. Include: executive summary, business case, objectives, approach, modality, timeline, budget, success metrics. Details: [provide].'},{ref:'Training Proposal Evaluator',prompt:'Evaluate the attached Training Proposal for completeness, clarity, and stakeholder readiness. Assess the following sections: executive summary, business case/problem statement, instructional goals, proposed solution and delivery modality, target audience, project timeline, budget estimate, resource requirements, success metrics, and risk mitigation. For each section, rate as Strong, Adequate, or Needs Improvement with specific feedback. Flag any missing sections, unsupported claims, or areas likely to draw stakeholder objections. Provide a prioritized list of revisions before submission.\n\nTraining Proposal: [attach or paste your Training Proposal]'}]},

{name:'Training Proposal Review and Sign-off Meeting',ic:'handshake',t:'milestone',meeting:true,desc:'Formal stakeholder meeting to review the Training Proposal, discuss scope, budget, timeline, and delivery approach, and obtain official sign-off to proceed into full design and development.',subs:['Distribute Training Proposal in advance for review','Present executive summary and business case','Walk through proposed solution, timeline, and budget','Address stakeholder questions and concerns','Obtain formal sign-off or document required revisions'],tools:[],del:['Signed Training Proposal','Meeting Notes with Decisions and Action Items'],ai:[{ref:'Training Proposal Review Agenda',prompt:'Create an agenda for a Training Proposal review and sign-off meeting. The proposal covers: [describe project]. Include time for presenting the business case, proposed solution, budget review, Q&A, and formal approval.'},{ref:'Sign-off Confirmation Email',prompt:'Draft a post-meeting email confirming Training Proposal sign-off, summarizing key decisions and approved scope: [paste meeting notes]'},{ref:'Training Proposal Review and Sign-off Meeting Invite',prompt:'Generate a calendar invite for a Training Proposal Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Review the Training Proposal — including scope, objectives, delivery approach, timeline, and budget — and obtain formal stakeholder sign-off to proceed.\nDesired Outcome: Approved Training Proposal with documented decisions and authorization to move into full design and development.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Training Proposal Review and Sign-off Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Training Proposal Review and Sign-off Meeting.\n\nUsing the attached Training Proposal and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the business problem and performance gap\n• Highlights the proposed training solution, delivery modality, and target audience\n• Outlines the project timeline, budget, and resource requirements\n• Identifies key decision points stakeholders should consider\n• Lists specific questions or items requiring stakeholder input during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nTraining Proposal: [attach or paste your Training Proposal]\nProject Summary: [attach or paste your Project Summary]'}]},

{name:'Project Plan + Timeline',ic:'calendar',t:'gate',desc:'Detailed project plan with tasks, milestones, dependencies, resource assignments, and deadlines. Governs execution of remaining ISD phases.',subs:['Estimate duration and effort per task','Identify dependencies and critical path','Assign resources and responsibilities','Create project in Asana'],tools:[{n:'Project Schedule Calculator Claude App',link:'https://alexedaleycreative.github.io/project-schedule-calculator/'},{n:'Project Plan and Timeline Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQA_cue_KsgoQpWU7HF1oolpAXZmVjU1ursG2YaKK-Vszho?e=IYzBUY'},{n:'Project Dashboard Claude App'}],del:['Project Plan and Timeline','Project Dashboard'],ai:[{ref:'Project Plan Creator',prompt:'Create a project plan for a [length] eLearning course on [topic]. Include all ISD phases, durations, dependencies, milestones. Launch date: [date].'},{ref:'Timeline Risk Reviewer',prompt:'Review this timeline for risks — underestimated tasks, missing dependencies, bottlenecks: [paste]'},
{ref:'Project Dashboard Generator',prompt:'You are building a standalone project dashboard app that I can deploy to GitHub Pages. The dashboard pulls live data from my Asana project via a GitHub Action that runs on a schedule, and publishes a static HTML page that stakeholders can view without an Asana login.\n\nStep 1: Gather project information\nBefore building anything, ask me for the following information one step at a time. Do not proceed until each step is answered.\n\n1a. Project name\nAsk: \"What is the name of your Asana project? I\'ll search Asana to find it and map the tasks.\"\nOnce I provide the project name, search Asana using the search_objects or get_projects tool to find the matching project. Confirm the project name and GID with me before proceeding. Then use get_project (with include_sections: true) and get_tasks (with full custom fields, memberships, assignee, and num_subtasks) to understand the project structure — sections, custom field names, task statuses, and date fields.\n\n1b. Brand colors\nAsk: \"What are your brand colors? I need a primary color (used for the header and accents) and a secondary color (used for highlights and emphasis). Provide hex codes (e.g., #FA4628).\"\n\n1c. Project summary\nAsk: \"Paste a 200-word-max summary of the business problem this project addresses. This appears at the top of the dashboard.\"\n\n1d. Key Dates document\nAsk: \"Upload your Key Dates document. This should contain project milestones with target dates and notes. I\'ll parse it and build the Key Dates table.\"\nParse the uploaded document (Word, PDF, or text) to extract milestone names, target dates, and notes. Build a KEY_DATES JavaScript array from the parsed data.\n\n1e. Stakeholder and SME Involvement Calendar\nAsk: \"Upload your Stakeholder and SME Involvement Calendar. This should list dates, who is involved, what action is required, and which items are sign-off gates. I\'ll parse it and build the What I Need From You section.\"\nParse the uploaded document to extract dates, stakeholder names, required actions, and gate indicators. Build a STK_EVENTS JavaScript array from the parsed data.\n\n1f. Dashboard owner\nAsk: \"Who should be listed as the project owner on the dashboard?\"\n\nStep 2: Explore the Asana project structure\nUsing the Asana MCP connector, gather:\n• Project GID and current status color\n• All sections with their GIDs (for correct ordering in the Gantt chart)\n• All tasks with these opt_fields: name, due_on, start_on, completed, assignee, assignee.name, custom_fields, custom_fields.name, custom_fields.display_value, custom_fields.type, memberships.section.name, memberships.section.gid, num_subtasks\n• Custom field mapping: Identify which custom fields correspond to Status (enum), Due Date (date), Start Date (date), % Done (number), Estimated Hours (number, optional), Actual Hours (number, optional)\nConfirm the custom field names with me if they don\'t match common patterns. The dashboard depends on correctly mapping these fields.\n\nStep 3: Build the GitHub Pages app\nGenerate a complete app with this file structure:\nproject-dashboard/\n  .github/workflows/deploy.yml  (GitHub Action: cron schedule + manual trigger)\n  scripts/build.js              (Node script: fetches Asana API, generates static HTML)\n  template.html                 (Dashboard HTML template with data placeholder)\n  package.json                  (Minimal package.json with build script)\n  README.md                     (Step-by-step setup instructions for GitHub beginners)\n\ntemplate.html requirements:\nThe dashboard must include these sections in this order:\n1. Header: Project name, Project Dashboard with Owner, status badge (On Track/At Risk/Off Track based on Asana project status color), progress bar with completion percentage at title-weight font size. Include Last updated timestamp below the status row.\n2. Project Summary: The business problem summary. Card with clipboard icon.\n3. Stats Row: Five stat cards — Total Tasks, Completed, In Progress, Late Starts (Not Started but past start date), Due This Week.\n4. What I Need From You: Stakeholder involvement table filtered to next 30 days. Sign-off gates highlighted with a gate tag. Past events hidden. Shows empty-state message when none upcoming.\n5. Key Dates: Milestone table with target dates, notes, and status indicators. Past milestones with strikethrough and reduced opacity.\n6. Project Timeline (Gantt): Interactive horizontal bar chart grouped by Asana sections in correct order. Month header grid, color-coded bars by status, progress fill based on % Done, expandable subtask drill-down, TODAY marker overlay, hover tooltips, diamond milestone markers for tasks without start dates.\n7. Two-column bottom row: Due This Week (tasks due Mon-Sun with TODAY and OVERDUE flags) and In Progress (On Track tasks plus Potential Delays subsection for Not Started tasks past their start date).\n\nStyling rules:\n• Use brand colors: primary for header gradient and accents, secondary for highlights and section backgrounds\n• All Project Timeline text must be black (#000000)\n• Status badge and progress bar should have thin white border for contrast against header\n• Responsive two-column layout that collapses to single column on mobile\n• Clean card-based design with subtle borders and shadows\n\nData handling:\n• All data comes from a DASHBOARD_DATA global variable injected at build time\n• Template uses var DASHBOARD_DATA = /*__DASHBOARD_DATA__*/null; as placeholder\n• Key Dates and Stakeholder Events are hardcoded arrays (not fetched from Asana)\n• parseTask() function must map custom field names to the correct fields identified in Step 2\n• Section ordering must use a hardcoded GID array matching the project\'s actual section order\n• Subtask expansion reads from a pre-fetched subtaskMap object — no API calls at view time\n\nbuild.js requirements:\n• Fetch project metadata, all tasks (with pagination), and pre-fetch all subtask details\n• Use the Asana REST API (https://app.asana.com/api/1.0)\n• Auth via ASANA_TOKEN environment variable (Bearer token)\n• Replace /*__DASHBOARD_DATA__*/null in template.html with the JSON data blob\n• Output to dist/index.html\n\ndeploy.yml requirements:\n• Triggers: schedule (cron every 30 minutes), push to main, workflow_dispatch\n• Set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true as a top-level env var\n• Use Node.js 22\n• Deploy using GitHub Pages actions (configure-pages, upload-pages-artifact, deploy-pages)\n• Permissions: contents: read, pages: write, id-token: write\n\nREADME.md requirements:\nWrite detailed, beginner-friendly setup instructions assuming no prior GitHub experience. Include:\n• Prerequisites (GitHub account, GitHub Desktop, Asana token)\n• Step-by-step: create repo, generate Asana token, upload files via GitHub Desktop (with note about hidden .github folder), add ASANA_TOKEN secret, enable GitHub Pages, trigger first build, find the dashboard URL\n• Troubleshooting: common errors (missing token, build failures)\n• How to change refresh frequency\n• Note about public vs. private repo implications for sharing\n\nStep 4: Deliver\nSave all files to the outputs folder and present them to me using present_files. Provide the folder structure so I can push it to GitHub.'}]}
]},

{n:'03',name:'Design',rte:{title:'Review, Test, and Evaluate',desc:'Multiple quality gates occur during Design. Deliverables are peer/SME reviewed, stakeholder-approved, and confirmed aligned to objectives before advancing.'},items:[
{name:'Develop Assessments',ic:'checkmark',t:'process',desc:'Design assessment instruments that directly measure learner achievement of each objective. Includes knowledge checks, performance assessments, pre/post tests, and rubrics.',subs:['Create items aligned to each objective','Develop rubrics and scoring criteria','Design formative assessments (knowledge checks)','Design summative assessments (final tests)','Write clear instructions and feedback'],tools:[{n:'Course Design Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDQM4kZvKQUSZ8lJ7qdHoOpAURMpoTA4e5018Ie7YrBIy8?e=fQ7F0H'}],del:['Course Design (partially complete)'],ai:[{ref:'Assessment Item Generator',prompt:'Create assessment items for these objectives: [list]. For each: 1 scenario-based, 1 multiple-choice, 1 performance task. Include answer keys.'},{ref:'Rubric Designer',prompt:'Design a rubric for [task]. Include criteria, 4-point scale, detailed descriptions per level.'},{ref:'Assessment Ideas Generator',prompt:'Generate creative and effective assessment ideas for the following course. For each learning objective, suggest at least two assessment types (e.g., scenario-based, multiple choice, performance task, drag-and-drop, matching, simulation, case study, reflection).\n\nFor each assessment idea, include:\n• Assessment type and format\n• Brief description of the activity\n• Which objective it measures\n• Bloom\'s Taxonomy level targeted\n• Estimated learner time\n\nIf the instructional goal and learning objectives are not provided below, ask me to provide them before generating ideas.\n\nInstructional Goal: [paste your instructional goal]\nLearning Objectives: [paste your learning objectives]'}]},

{name:'Design Instructional Strategy',ic:'puzzle',t:'process',desc:'Define the overall instructional approach — sequencing, delivery methods, engagement strategies, practice design, chunking, and pacing. Ensures the experience is pedagogically sound.',subs:['Select strategies aligned with objective types','Define content sequencing and scaffolding','Design practice and feedback mechanisms','Plan engagement and motivation strategies','Determine chunking and pacing for modality'],tools:[{n:'Course Design Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDQM4kZvKQUSZ8lJ7qdHoOpAURMpoTA4e5018Ie7YrBIy8?e=fQ7F0H'}],del:['Course Design (partially complete)'],ai:[{ref:'Strategy Architect',prompt:'Design an instructional strategy for [topic] for [audience]. Objectives: [list]. Recommend sequencing, practice, engagement, chunking. Justify each.'},{ref:'Strategy Comparison',prompt:'Suggest three instructional strategy approaches and compare strengths for my audience: [details]'}]},

{name:'Define Metrics for Evaluation',ic:'barchart',t:'process',desc:'Establish the evaluation framework with specific metrics to measure training effectiveness at multiple Kirkpatrick levels (reaction, learning, behavior, results).',subs:['Define Level 1 (Reaction) metrics','Define Level 2 (Learning) metrics','Define Level 3 (Behavior) metrics','Define Level 4 (Results) metrics','Establish data collection methods per level'],tools:[{n:'Formative Evaluation Plan Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCF7huxTI-fSIxmzVtWKUwbAdbscBKsV6nh1ZEY0IqLEAg?e=nWNAGv'},{n:'Course Design Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDQM4kZvKQUSZ8lJ7qdHoOpAURMpoTA4e5018Ie7YrBIy8?e=fQ7F0H'}],del:['Course Design (partially complete)','Formative Evaluation Plan'],ai:[{ref:'Evaluation Framework Builder',prompt:'Complete the attached Formative Evaluation Plan. Design an evaluation framework using Kirkpatrick\'s Four Levels for [topic]. Define metrics, collection methods, timeline, and responsible parties per level.'},{ref:'L1 Survey Designer',prompt:'Create a Level 1 (reaction) survey for an eLearning course on [topic]. Mix Likert scales and open-ended questions.'}]},

{name:'Draw Adaptive Learning Paths',ic:'fork',t:'process',desc:'Design branching or adaptive pathways that personalize the learner experience based on pre-assessment results, role, or in-course performance.',subs:['Define learner segments or personas','Map content paths for each segment','Design branching logic based on assessment','Create remediation paths for struggling learners','Plan acceleration paths for advanced learners'],tools:[{n:'Miro',link:'https://www.miro.com'}],del:['Course Design (partially complete)'],ai:[{ref:'Adaptive Path Designer',prompt:'Design adaptive learning paths for [topic]. Three audience segments: [describe]. Map personalized paths with branching, remediation, and acceleration.'},{ref:'Pre-Assessment Branching Logic',prompt:'Create a decision tree for adaptive branching after a pre-assessment. Define score thresholds and content differences.'}]},

{name:'Course Design/Storyboard',ic:'film',t:'gate',signoff:true,desc:'Create the detailed, screen-by-screen blueprint of the learning experience. Maps content, interactions, assessments, media, and navigation for each module. Serves as the development blueprint.',subs:['Organize content into modules, lessons, screens','Write on-screen text, narration, interaction descriptions','Specify media requirements','Map interactions, practice, branching logic','Include assessment items per objective','Apply Gagné\'s 9 Events as framework'],tools:[{n:'Course Design Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDQM4kZvKQUSZ8lJ7qdHoOpAURMpoTA4e5018Ie7YrBIy8?e=fQ7F0H'},{n:'Storyboard Template'}],del:['Course Design (completed)','Storyboard (completed)'],ai:[{ref:'Storyboard Builder',prompt:'Create a storyboard outline for a module on [topic]. Per screen: title, text, narration, interaction, media, objective addressed. Use Gagné\'s 9 Events.'},{ref:'Voiceover Script Writer',prompt:'Generate a voiceover script as a Word document (.docx) using the following table format:\n\nColumns: No. | Scene Description | Voiceover Script | Visuals\n\nFor each scene/screen, provide:\n• No.: Sequential scene number\n• Scene Description: Brief description of what is happening on screen\n• Voiceover Script: The exact narration text to be recorded\n• Visuals: Description of on-screen graphics, animations, or text that accompany the narration\n\nGuidelines:\n• Write in a conversational, professional tone unless otherwise specified\n• Keep each scene\'s narration to 30-60 seconds (approximately 75-150 words)\n• Ensure narration complements rather than duplicates on-screen text\n• Include transition cues between scenes\n\nCourse Topic: [describe your course topic]\nTone/Style: [conversational, formal, friendly, etc.]\nStoryboard/Content: [paste your storyboard or course outline]'}]},

{name:'Course Design/Storyboard + Project Schedule/Timeline Review and Sign-off Meeting',ic:'handshake',t:'milestone',meeting:true,desc:'Stakeholder and SME review meeting to walk through the completed course design/storyboard and project schedule. Ensures content accuracy, instructional approach, and timeline are approved before development begins.',subs:['Distribute course design/storyboard and project schedule in advance','Walk through course structure, content flow, and interactions','Review assessment strategy and alignment to objectives','Review project schedule, milestones, and dependencies','Collect feedback and obtain formal sign-off to proceed to development'],tools:[],del:['Signed Course Design/Storyboard','Approved Project Schedule','Meeting Notes with Feedback and Decisions'],ai:[{ref:'Storyboard Review Meeting Agenda',prompt:'Create an agenda for a course design/storyboard and project schedule review meeting. The course is: [describe]. Include sections for walking through the storyboard, reviewing assessments, discussing the project timeline, and collecting sign-off.'},{ref:'Review Sign-off Email',prompt:'Draft a post-meeting email confirming course design/storyboard and project schedule sign-off with key feedback incorporated: [paste meeting notes]'},{ref:'Course Design/Storyboard + Project Schedule/Timeline Review and Sign-off Meeting Invite',prompt:'Generate a calendar invite for a Course Design/Storyboard and Project Schedule/Timeline Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Walk through the completed course design/storyboard and project schedule to validate content, instructional approach, and timeline before development begins.\nDesired Outcome: Approved course design/storyboard and project schedule with formal sign-off to proceed to development.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Course Design/Storyboard + Project Schedule/Timeline Review and Sign-off Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Course Design/Storyboard and Project Schedule/Timeline Review and Sign-off Meeting.\n\nUsing the attached Course Design/Storyboard and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the course structure, modules, and content flow\n• Highlights the instructional strategy, engagement approach, and assessment design\n• Outlines the project schedule with key milestones and dependencies\n• Identifies areas where stakeholder or SME input is needed\n• Lists specific questions or items requiring stakeholder feedback during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nCourse Design/Storyboard: [attach or paste your Course Design/Storyboard]\nProject Summary: [attach or paste your Project Summary]'}]},

{name:'Formative Evaluation Plan',ic:'flask',t:'gate',signoff:true,desc:'Plan how the course will be evaluated during development through one-to-one reviews, small-group trials, and expert reviews. Catches problems early.',subs:['Define evaluation stages (one-to-one, small group, field trial)','Identify evaluators per stage','Create evaluation instruments and checklists','Establish timelines per round','Define revision criteria and thresholds'],tools:[{n:'Formative Evaluation Plan Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCF7huxTI-fSIxmzVtWKUwbAdbscBKsV6nh1ZEY0IqLEAg?e=nWNAGv'}],del:['Formative Evaluation Plan'],ai:[{ref:'Formative Eval Planner',prompt:'Complete the attached Formative Evaluation Template. Create a formative evaluation plan for [topic] eLearning. Three stages: one-to-one, small-group ([N] learners), field trial. Define purpose, participants, data collection, revision criteria.'},{ref:'One-to-One Protocol Designer',prompt:'Design a one-to-one evaluation protocol. Include think-aloud instructions, observation checklist, post-session interview questions.'},{ref:'Formative Evaluation Review',prompt:'Review the attached Formative Evaluation Plan for quality and effectiveness. Evaluate against both Kirkpatrick\'s Four Levels of Evaluation and Phillips\' ROI Methodology.\n\nAssess the following:\n• Are evaluation stages clearly defined (one-to-one, small group, field trial)?\n• Are appropriate data collection methods specified per stage?\n• Are evaluation instruments aligned with learning objectives?\n• Does the plan address all four Kirkpatrick levels (Reaction, Learning, Behavior, Results)?\n• Does the plan consider Phillips\' Level 5 (ROI) where applicable?\n• Are revision criteria and thresholds clearly defined?\n• Are evaluator roles and timelines realistic?\n• Are there gaps in what is being measured?\n\nProvide specific feedback on strengths, weaknesses, and recommended improvements for each section.\n\nFormative Evaluation Plan: [attach or paste your plan]'}]},

{name:'Formative Evaluation Plan Review and Sign-off Meeting',ic:'handshake',t:'milestone',meeting:true,desc:'Meeting with stakeholders to review the Formative Evaluation Plan, confirm evaluation stages, participants, instruments, and revision criteria, and obtain sign-off before beginning formative evaluation activities.',subs:['Distribute Formative Evaluation Plan in advance','Present evaluation stages and methodology','Review evaluation instruments and checklists','Confirm evaluator assignments and timelines','Obtain formal sign-off on the plan'],tools:[],del:['Signed Formative Evaluation Plan','Meeting Notes with Decisions'],ai:[{ref:'Formative Eval Review Agenda',prompt:'Create an agenda for a Formative Evaluation Plan review and sign-off meeting. The plan covers: [describe evaluation approach]. Include sections for reviewing each evaluation stage, instruments, and timeline.'},{ref:'Eval Plan Sign-off Email',prompt:'Draft a post-meeting email confirming Formative Evaluation Plan sign-off and summarizing evaluation stages and timeline: [paste meeting notes]'},{ref:'Formative Evaluation Plan Review and Sign-off Meeting Invite',prompt:'Generate a calendar invite for a Formative Evaluation Plan Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Review the Formative Evaluation Plan — including evaluation stages, participants, instruments, and revision criteria — and obtain formal sign-off before beginning formative evaluation activities.\nDesired Outcome: Approved Formative Evaluation Plan with sign-off to proceed with evaluation.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Formative Evaluation Plan Review and Sign-off Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Formative Evaluation Plan Review and Sign-off Meeting.\n\nUsing the attached Formative Evaluation Plan and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the evaluation approach and methodology\n• Highlights each evaluation stage (one-to-one, small group, field trial) with participants and timeline\n• Outlines the evaluation instruments and data collection methods\n• Identifies revision criteria and decision thresholds\n• Lists specific questions or items requiring stakeholder input during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nFormative Evaluation Plan: [attach or paste your Formative Evaluation Plan]\nProject Summary: [attach or paste your Project Summary]'}]}
]},

// ── PHASE 4: DEVELOPMENT ──
{n:'04',name:'Development',rte:{title:'Review, Test, and Evaluate',desc:'Development entry and exit gates. Confirm all design deliverables are complete before starting, and verify the built course is ready for testing before advancing.'},items:[
{name:'SME Interviews for Content Deep Dives',ic:'people',t:'milestone',meeting:true,desc:'Structured interviews with subject matter experts to gather detailed, accurate content for course development. Focuses on extracting expert knowledge, real-world scenarios, common misconceptions, and edge cases that inform the learning experience.',subs:['Identify SMEs by content area and schedule interviews','Prepare interview guides with targeted questions per topic','Conduct interviews and record (with permission)','Document key content, examples, and scenarios','Validate captured content with SMEs for accuracy'],tools:[],del:['SME Interview Notes','Content Detail Documentation','Validated Content for Development'],ai:[{ref:'SME Interview Guide',prompt:'Create an SME interview guide for a course on [topic]. Include questions that extract: key concepts, common mistakes, real-world scenarios, decision-making processes, and expert tips. Format as a structured interview protocol.'},{ref:'Interview Notes Synthesizer',prompt:'Synthesize these SME interview notes into organized content documentation ready for course development. Group by topic, flag contradictions, and highlight key examples: [paste notes]'},{ref:'SME Interviews for Content Deep Dives Invite',prompt:'Generate a calendar invite for an SME Interview for Content Deep Dives. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the interview and the expected outcome\n2. A high-level, non-timed agenda for the interview session\n\nPurpose: Conduct a structured interview to gather detailed content, real-world scenarios, common misconceptions, and edge cases from this subject matter expert for course development.\nDesired Outcome: Documented expert knowledge, validated examples, and accurate content ready for course development.\n\nProject Summary: [attach or paste your Project Summary]\nSME topic area: [describe the specific content area this SME will cover]'}]},

{name:'Develop Instructional Materials',ic:'build',t:'process',desc:'The core production phase — build all content, interactions, assessments, and multimedia in the authoring tool. Typically the longest and most resource-intensive phase.',subs:['Build course structure and navigation','Develop on-screen content and interactions','Write scripts and produce voiceover','Develop activities and practice exercises','Write assessment feedback','Produce and integrate multimedia','Apply accessibility and UDL principles','Design navigation and UI elements','Conduct internal quality checks'],tools:[{n:'Revision Tracker (ID) Template',link:'https://1drv.ms/x/c/cc839e3a35a19644/IQA8zFpo6FRbTImehefPhfNHAQMH9ebrumBz2FW2GKJRGfo?e=NBU1l5'},{n:'Revision Tracker (SME) Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQBviO08KbOKS5k2b5XgVk4_AVW2SHYobTrX0tNiI8e5fZQ?e=cPIyNn'},{n:'Adobe Creative Cloud',link:'https://www.adobe.com/creativecloud.html'},{n:'Articulate 360',link:'https://id.articulate.com/redirect/login'},{n:'ChatGPT',link:'https://chatgpt.com'},{n:'Claude AI',link:'https://claude.ai'},{n:'ElevenLabs',link:'https://elevenlabs.io'},{n:'Envato',link:'https://www.envato.com'},{n:'GitHub',link:'https://github.com'},{n:'Synthesia',link:'https://www.synthesia.io'},{n:'TinyPNG',link:'https://tinypng.com'}],del:['Developed eLearning course files','All multimedia assets','Narration audio files','Interaction source files'],ai:[{ref:'Scenario Interaction Builder',prompt:'Create a scenario-based branching interaction for [skill]. Include setup, 3 decision points, consequences, feedback.'},{ref:'Accessibility Description Generator',prompt:'Generate alt text and accessibility descriptions for these screens (WCAG 2.1 AA): [describe visuals]'},{ref:'eLearning Quality Review',prompt:'Conduct a comprehensive quality review of the attached eLearning course materials. Evaluate against these 9 categories:\\n\\n1. ACTIVITIES & ASSESSMENTS — Instructions, functionality, grading, feedback\\n2. AGENTS — Politeness, cultural fit, design simplicity, feedback styles\\n3. AUDIO — Playback quality, consistency, closed captioning, sync\\n4. GRAMMAR & WRITING — Correctness, acronyms, capitalization, formatting, procedures\\n5. GRAPHICS & MULTIMEDIA — Image clarity, icon consistency, compression, alt text, color contrast\\n6. USER INTERFACE DESIGN — Button/hyperlink/table/text formatting consistency, accessibility compliance\\n7. FUNCTIONALITY — Button/hyperlink behavior, navigation, slide transitions, pause capability, downloads\\n8. CONTENT ORGANIZATION — Lesson order, titles, navigation instructions, concluding slide\\n9. FILE & EXPORT — Menu/site map completeness, playback speed adjustment\\n\\nFor each category, identify specific issues found, rate overall quality (Pass, Needs Revision, Fail), and provide actionable fix recommendations.\\n\\nCourse Materials: [attach or describe the eLearning content to review]'}]},

{name:'Conduct Alpha "Wireframe" Testing',ic:'beaker',t:'process',desc:'Internal testing of the near-final build to identify functional issues, content errors, and usability problems before SME review. Focuses on technical functionality and UX.',subs:['Define alpha test plan and test cases','Recruit internal testers','Execute tests across target platforms','Document bugs, issues, enhancement requests','Address critical issues before beta'],tools:[{n:'eLearning Quality Checklist',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQDrVidfN3x6RYVa8cp0fG9KAawVhAVDjyk7fOUxDQjxrrQ?e=k1l2jO'}],del:['Alpha test report','Bug/issue log','Revised course build'],ai:[{ref:'Alpha Test Case Generator',prompt:'Create alpha test cases for an eLearning course. Cover: navigation, interactions, scoring, branching, media, SCORM/xAPI tracking, accessibility. Format as spreadsheet.'}]},

{name:'Conduct Beta (SME + Stakeholder) Testing',ic:'eye',t:'process',desc:'Formal review by SMEs and stakeholders to validate content accuracy, relevance, and business alignment. This is the content sign-off stage.',subs:['Distribute course with review guidelines','Provide SME review checklist','Collect and consolidate feedback','Conduct stakeholder walkthrough','Implement revisions','Obtain formal sign-off'],tools:[],del:['SME review feedback log','Revised course build'],ai:[{ref:'SME Review Request Email',prompt:'Draft an email to SMEs requesting course review. Include focus areas, feedback method, deadline, checklist link.'},{ref:'Feedback Prioritizer',prompt:'Consolidate and prioritize this SME feedback. Categorize as: critical, important, nice-to-have: [paste feedback]'}]}
]},

// ── PHASE 5: IMPLEMENTATION ──
{n:'05',name:'Implementation',rte:{title:'Review, Test, and Evaluate',desc:'Post-launch gate. Confirm successful deployment, verify evaluation instruments are in place, and review initial learner data for issues before transitioning to formal evaluation.'},items:[
{name:'Publish Course to LMS',ic:'cloud',t:'process',desc:'Package and deploy the finalized course to the LMS. Configure enrollment, tracking, reporting, and completion criteria.',subs:['Export in required format (SCORM, xAPI, cmi5)','Upload and configure in LMS','Set enrollment rules and availability dates','Configure completion criteria and certificates','Set up reporting dashboards'],tools:[],del:['Published course in LMS','Enrollment plan'],ai:[{ref:'LMS Publishing Checklist',prompt:'Create a SCORM/xAPI publishing checklist for [LMS name]. Include pre-upload, configuration, and post-upload verification.'},{ref:'Course Launch Email',prompt:'Draft a course launch email for [audience]. Include: what, why, how to access, deadline, time estimate, support contact.'}]},

{name:'Conduct Final QA',ic:'lock',t:'gate',signoff:true,desc:'Final quality assurance in the production environment. Verify tracking, scoring, completion, and reporting all function correctly in the real LMS.',subs:['Test complete flow in production LMS','Verify SCORM/xAPI tracking','Test completion and certificate triggers','Verify reporting accuracy','Test across browsers and devices','Final accessibility audit'],tools:[],del:['Final QA test report','Tracking verification results','Go-live approval'],ai:[{ref:'Production QA Test Plan',prompt:'Create a final QA test plan for production LMS. Cover: SCORM tracking, completion, scores, bookmarking, certificates, cross-platform compatibility.'}]},

{name:'Launch Meeting',ic:'rocket',t:'milestone',meeting:true,desc:'Internal coordination meeting with stakeholders, support teams, and communications to finalize launch logistics, confirm readiness, and align on the go-live plan for the training rollout.',subs:['Confirm course is published and QA-verified in LMS','Review launch communication plan and timeline','Brief help desk and support teams','Confirm enrollment lists and notifications are ready','Align on monitoring plan for launch day and first week'],tools:[],del:['Launch Readiness Checklist','Launch Meeting Notes'],ai:[{ref:'Launch Meeting Agenda',prompt:'Create an agenda for a training launch coordination meeting. The course is: [describe]. Include sections for LMS readiness, communications plan, support team briefing, and day-one monitoring.'},{ref:'Launch Readiness Checklist Generator',prompt:'Create a launch readiness checklist covering: LMS configuration, enrollment, communications, support briefing, monitoring plan, and escalation contacts for [topic] training.'},{ref:'Launch Meeting Invite',prompt:'Generate a calendar invite for a Launch Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Finalize launch logistics, confirm readiness across all teams, and align on the go-live plan for the training rollout.\nDesired Outcome: Confirmed launch readiness with all teams aligned on responsibilities, timeline, and escalation plan for launch day and the first week.\n\nProject Summary: [attach or paste your Project Summary]'}]},

{name:'Launch Training',ic:'star',t:'milestone',desc:'Formal organization-wide launch. Includes communication campaigns, enrollment notifications, and support readiness.',subs:['Execute launch communication plan','Send enrollment notifications','Brief help desk/support team','Monitor initial activity','Address day-one issues quickly'],tools:[],del:['Launch communications (sent)','Enrollment confirmation'],ai:[{ref:'Multi-Channel Launch Plan',prompt:'Create a multi-channel launch plan for [topic] training. Include: email, manager talking points, intranet post, Slack message. Audience: [describe].'},{ref:'Launch Day Email',prompt:'Write a launch day email for mandatory training. Include: coverage, importance, access link, deadline, time estimate.'}]}
]},

// ── PHASE 6: EVALUATION ──
{n:'06',name:'Evaluation',rte:{title:'Review, Test, and Evaluate',desc:'Final quality gate before project closure. Verify all evaluation is complete, revisions implemented, and project ready to close.'},items:[
{name:'Summative Evaluation Plan',ic:'piechart',t:'gate',signoff:true,desc:'Comprehensive evaluation using the metrics defined in Design. Analyze data across Kirkpatrick levels to determine if training achieved its objectives and impacted business performance.',subs:['Collect/analyze Level 1 (Reaction) data','Collect/analyze Level 2 (Learning) data','Plan/execute Level 3 (Behavior) collection','Analyze Level 4 (Results) data','Compile evaluation report','Present findings to stakeholders'],tools:[{n:'Summative Evaluation Plan Template',link:'https://1drv.ms/w/c/cc839e3a35a19644/IQCusjSwSs9DTKI-2xz7XAkEAb0a5B6Wiik88mn2c_0P2gM?e=3buQU1'}],del:['Summative Evaluation Plan','Data analysis results','Stakeholder presentation'],ai:[{ref:'Training Data Analyst',prompt:'Analyze this training evaluation data and identify trends, strengths, areas for improvement: [paste data]. Provide Kirkpatrick-level recommendations.'},{ref:'Stakeholder Evaluation Presentation',prompt:'Generate a stakeholder presentation that communicates the results of the summative evaluation. The presentation should include:\n\n• Title slide with project name, date, and presenter\n• Executive summary of training objectives and scope\n• Evaluation methodology and data sources\n• Results by Kirkpatrick level (L1: Reaction, L2: Learning, L3: Behavior, L4: Results)\n• Key findings — strengths and areas for improvement\n• Data visualizations (charts/tables for completion rates, assessment scores, survey results)\n• ROI analysis (if applicable)\n• Recommendations and next steps\n• Appendix with detailed data\n\nFormat the output as a slide-by-slide outline with speaker notes for each slide.\n\nYou must provide the Summative Evaluation Plan/Report to generate this presentation. If not provided, ask for it before proceeding.\n\nSummative Evaluation Report: [attach or paste your evaluation report]'}]},

{name:'Summative Evaluation Plan Review and Sign-off Meeting',ic:'handshake',t:'milestone',meeting:true,desc:'Meeting with stakeholders to review the Summative Evaluation Plan, confirm evaluation metrics across Kirkpatrick levels, data collection methods, and timeline, and obtain sign-off before executing the evaluation.',subs:['Distribute Summative Evaluation Plan in advance','Present evaluation framework and Kirkpatrick-level metrics','Review data collection methods and responsible parties','Confirm evaluation timeline and reporting schedule','Obtain formal sign-off on the plan'],tools:[],del:['Signed Summative Evaluation Plan','Meeting Notes with Decisions'],ai:[{ref:'Summative Eval Review Agenda',prompt:'Create an agenda for a Summative Evaluation Plan review and sign-off meeting. The plan covers: [describe evaluation approach]. Include sections for reviewing metrics at each Kirkpatrick level, data collection methods, and reporting timeline.'},{ref:'Eval Plan Sign-off Confirmation',prompt:'Draft a post-meeting email confirming Summative Evaluation Plan sign-off with evaluation timeline and reporting milestones: [paste meeting notes]'},{ref:'Summative Evaluation Plan Review and Sign-off Meeting Invite',prompt:'Generate a calendar invite for a Summative Evaluation Plan Review and Sign-off Meeting. Write in a friendly, warm, concise, and professional tone.\n\nInclude:\n1. A brief message summarizing the purpose of the meeting and the expected outcome\n2. A high-level, non-timed meeting agenda\n\nPurpose: Review the Summative Evaluation Plan — including evaluation metrics across Kirkpatrick levels, data collection methods, and timeline — and obtain formal sign-off before executing the evaluation.\nDesired Outcome: Approved Summative Evaluation Plan with sign-off to begin evaluation execution.\n\nProject Summary: [attach or paste your Project Summary]'},{ref:'Summative Evaluation Plan Review and Sign-off Meeting Pre-Read',prompt:'Generate a Pre-Read document as a Word document (.docx) for stakeholders attending the Summative Evaluation Plan Review and Sign-off Meeting.\n\nUsing the attached Summative Evaluation Plan and Project Summary, create a concise stakeholder-ready document that:\n• Summarizes the evaluation framework and Kirkpatrick-level metrics\n• Highlights data collection methods and responsible parties\n• Outlines the evaluation timeline and reporting schedule\n• Identifies key metrics and thresholds stakeholders should focus on\n• Lists specific questions or items requiring stakeholder input during the meeting\n\nKeep it brief and scannable — stakeholders should be able to review this in 10-15 minutes so they come prepared to discuss and sign off.\n\nSummative Evaluation Plan: [attach or paste your Summative Evaluation Plan]\nProject Summary: [attach or paste your Project Summary]'}]},

{name:'Revise Training',ic:'refresh',t:'process',desc:'Based on evaluation data, implement revisions to improve the training — content updates, interaction redesigns, assessment refinements, or structural changes.',subs:['Prioritize revisions from evaluation findings','Plan revision scope and timeline','Implement changes','Re-test revised sections','Re-publish updated course','Document changes in revision tracker'],tools:[],del:['Revised course build','Completed revision tracker','Change log'],ai:[{ref:'Revision Priority Planner',prompt:'Create a prioritized revision plan from this feedback. Categorize as: quick wins, medium effort, major redesigns. Include time estimates: [paste feedback].'},{ref:'Content Clarity Rewriter',prompt:'Rewrite this confusing section. Feedback: [paste]. Original: [paste]. Make clearer while maintaining accuracy.'}]}
]},

// ── PHASE 7: PROJECT CLOSE ──

// ═══════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════
let activeTab=0,activeSel=null;
const tabsEl=document.getElementById('tabs'),listEl=document.getElementById('list'),sbEl=document.getElementById('sb'),sbiEl=document.getElementById('sbi'),statsEl=document.getElementById('stats');

// Stats
const totalMilestones=DATA.reduce((s,p)=>s+p.items.length,0);
const totalGates=DATA.reduce((s,p)=>s+p.items.filter(m=>m.t==='gate').length,0);
statsEl.innerHTML=[
  {v:DATA.length,l:'Phases'},
  {v:totalMilestones,l:'Milestones'},
  {v:totalGates,l:'Alignment + Quality Gates'}
].map(s=>`<div class="stat"><div class="sv">${s.v}</div><div class="sl">${s.l}</div></div>`).join('');

function renderTabs(){
  tabsEl.innerHTML='';
  DATA.forEach((p,i)=>{
    const t=document.createElement('div');
    t.className='tab'+(i===activeTab?' active':'');
    t.innerHTML=`<span class="tn">PHASE ${p.n}</span>${p.name}`;
    t.onclick=()=>{activeTab=i;activeSel=null;renderTabs();renderList();sbEl.className='sidebar';};
    tabsEl.appendChild(t);
  });
}

function renderList(){
  const phase=DATA[activeTab];
  listEl.innerHTML='';
  phase.items.forEach((m,i)=>{
    const c=document.createElement('div');
    c.className='card'+(activeSel===i?' sel':'');
    let tags=m.t==='gate'?`<span class="tg gate">GATE</span>`:'';
    if(m.meeting)tags+=`<span class="tg meeting">MEETING</span>`;
    if(m.signoff)tags+=`<span class="tg signoff">SIGN-OFF</span>`;
    if(m.del.length)tags+=`<span class="tg dt">${m.del.length} DELIVERABLE${m.del.length>1?'S':''}</span>`;
    if(m.ai.length)tags+=`<span class="tg dt">${m.ai.length} AI PROMPT${m.ai.length>1?'S':''}</span>`;
    c.innerHTML=`<div class="num">${i+1}</div><div class="ic">${ic(m.ic)}</div><div class="info"><div class="nm">${m.name}</div><div class="ds">${m.desc}</div><div class="tgs">${tags}</div></div><div class="arr">›</div>`;
    c.onclick=()=>{activeSel=i;renderList();showSidebar(phase,m);};
    listEl.appendChild(c);
  });
  // RTE Banner
  if(phase.rte){
    const b=document.createElement('div');
    b.className='rte-banner';
    b.innerHTML=`<div class="rte-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="3,7 6,10 11,4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="rte-text"><div class="rte-title">${phase.rte.title}</div><div class="rte-desc">${phase.rte.desc}</div></div>`;
    listEl.appendChild(b);
  }
}

function showSidebar(phase,m){
  sbEl.className='sidebar open';
  var html='<button class="sb-x" onclick="sbEl.className=\'sidebar\';activeSel=null;renderList();">✕</button>';
  html+='<div class="sb-phase">Phase '+phase.n+' · '+phase.name+'</div>';
  html+='<div class="sb-title">'+m.name+'</div>';
  html+='<div class="sb-rule"></div>';
  html+='<div class="sb-desc">'+m.desc+'</div>';

  // Sub-steps
  if(m.subs.length){
    html+='<div class="sb-section"><div class="sb-label">Sub-Steps</div><ol class="sb-list">'+m.subs.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ol></div>';
  }

  // Tools
  if(m.tools.length){
    html+='<div class="sb-section"><div class="sb-label">Tools &amp; Templates</div><div>';
    m.tools.forEach(function(t){
      if(t.link){
        html+='<a class="sb-tool" href="'+t.link+'" target="_blank" rel="noopener">'+t.n+'<svg viewBox="0 0 12 12" fill="none"><path d="M4 1h7v7M11 1L5 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>';
      } else {
        html+='<span class="sb-tool-nolink">'+t.n+'</span>';
      }
    });
    html+='</div></div>';
  }

  // Deliverables
  if(m.del.length){
    html+='<div class="sb-section"><div class="sb-label">Deliverables</div><div>'+m.del.map(function(d){return '<span class="sb-del">'+d+'</span>';}).join('')+'</div></div>';
  }

  // AI Prompts (accordion)
  if(m.ai.length){
    var accId='acc_'+Math.random().toString(36).substr(2,5);
    html+='<div class="sb-section">';
    html+='<div class="acc-toggle" onclick="var b=document.getElementById(\''+accId+'\');var c=this.querySelector(\'.acc-chevron\');b.classList.toggle(\'open\');c.classList.toggle(\'open\');">';
    html+='<div class="sb-label" style="cursor:pointer">AI Prompts ('+m.ai.length+')</div>';
    html+='<span class="acc-chevron">▼</span></div>';
    html+='<div class="acc-body" id="'+accId+'">';
    m.ai.forEach(function(a,idx){
      var copyId='cp_'+accId+'_'+idx;
      html+='<div class="ai-card"><button class="ai-copy" id="'+copyId+'" onclick="navigator.clipboard.writeText(document.getElementById(\''+copyId+'_t\').innerText).then(function(){var btn=document.getElementById(\''+copyId+'\');btn.textContent=\'COPIED\';btn.classList.add(\'copied\');setTimeout(function(){btn.textContent=\'COPY\';btn.classList.remove(\'copied\');},1500);})">COPY</button><div class="ai-ref">'+a.ref+'</div><div class="ai-prompt" id="'+copyId+'_t">'+fmtAI(a.prompt)+'</div></div>';
    });
    html+='</div></div>';
  }

  sbiEl.innerHTML=html;
}

renderTabs();
renderList();
</script>
</body>
</html>
